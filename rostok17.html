!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Rost/0k v1.7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');
:root {
  --bg:#03060c; --bg2:#070b14; --panel:#0a0f1c;
  --border:#111b2e; --accent:#5fffc0; --accent2:#ff5580;
  --accent3:#9060ff; --accent4:#ffcc44; --dim:#1e2e48;
  --text:#b8cce8; --textdim:#334a6a;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body {
  font-family:'Martian Mono',monospace;
  font-size:11px;
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100dvh;
}

#hdr {
  flex-shrink:0;
  height:42px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 12px;
  gap:10px;
  overflow:hidden;
}
.logo {
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:20px;
  color:var(--accent);
  letter-spacing:.04em;
  flex-shrink:0;
}
.hbadge {
  font-size:8px;
  padding:2px 6px;
  border:1px solid var(--dim);
  color:var(--textdim);
  letter-spacing:.12em;
  white-space:nowrap;
  transition:all .3s;
}
.hbadge.on { border-color:var(--accent); color:var(--accent); }
.hbadge.slp { border-color:var(--accent3); color:var(--accent3); }
.hbadge.hng { border-color:var(--accent2); color:var(--accent2); animation:pulse 1.4s infinite; }
@keyframes pulse { 50%{opacity:.4;} }
#hdr-right { margin-left:auto; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.ebar { width:50px; height:4px; background:var(--dim); border-radius:2px; overflow:hidden; }
.efill {
  height:100%;
  border-radius:2px;
  background:linear-gradient(90deg,var(--accent2),var(--accent4),var(--accent));
  transition:width .5s;
}
.hval { color:var(--accent3); font-size:9px; min-width:28px; }

#graph-wrap {
  flex:1;
  position:relative;
  min-height:0;
  overflow:hidden;
  touch-action:pan-x pan-y pinch-zoom;
}
#gc { display:block; width:100%; height:100%; }
.plabel {
  position:absolute; top:7px; left:9px;
  font-size:8px; color:var(--textdim);
  letter-spacing:.16em; text-transform:uppercase;
  pointer-events:none;
}
#node-count {
  position:absolute; top:7px; right:9px;
  font-size:9px; color:var(--textdim);
}
#focus-label {
  position:absolute; bottom:8px; left:9px;
  color:var(--accent3);
  letter-spacing:.1em;
  pointer-events:none;
  font-style:italic;
  font-family:'Cormorant Garamond',serif;
  font-size:14px;
}

#vision {
  flex-shrink:0;
  height:38px;
  background:var(--bg2);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
#vc { display:block; width:100%; height:100%; }
.vlabel {
  position:absolute; top:3px; left:6px;
  font-size:7px; color:var(--textdim);
  letter-spacing:.16em;
  pointer-events:none;
}
.vmetric {
  position:absolute; top:3px; right:6px;
  font-size:7px; color:var(--textdim);
  letter-spacing:.08em;
  pointer-events:none;
}

#reflection {
  flex-shrink:0;
  min-height:28px;
  padding:6px 12px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:13px;
  color:var(--accent4);
  letter-spacing:.02em;
  line-height:1.3;
  transition:color .8s, opacity .8s;
  display:flex;
  align-items:center;
}
#reflection.fade { opacity:.35; }

#input-zone {
  flex-shrink:0;
  padding:8px 10px;
  display:flex;
  gap:6px;
  align-items:center;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}
#txt-input {
  flex:1;
  background:var(--bg);
  border:1px solid var(--dim);
  color:var(--text);
  font-family:'Martian Mono',monospace;
  font-size:10px;
  padding:6px 8px;
  outline:none;
  border-radius:2px;
  -webkit-appearance:none;
  transition:border-color .2s;
}
#txt-input:focus { border-color:var(--accent3); }
#txt-input::placeholder { color:var(--textdim); font-size:9px; }
#btn-send {
  background:var(--accent3);
  border:none;
  color:var(--bg);
  font-family:'Martian Mono',monospace;
  font-size:11px;
  padding:6px 12px;
  cursor:pointer;
  border-radius:2px;
  font-weight:700;
  -webkit-appearance:none;
  flex-shrink:0;
}
#btn-send:active { opacity:.7; }

#controls {
  flex-shrink:0;
  padding:6px 10px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:5px;
}
.brow { display:flex; gap:5px; flex-wrap:wrap; }
.btn {
  background:transparent;
  border:1px solid var(--dim);
  color:var(--textdim);
  font-family:'Martian Mono',monospace;
  font-size:9px;
  padding:5px 8px;
  cursor:pointer;
  letter-spacing:.06em;
  text-transform:uppercase;
  transition:all .2s;
  -webkit-appearance:none;
  border-radius:2px;
}
.btn:active { opacity:.7; }
.btn.p { border-color:var(--accent3); color:var(--accent3); }
.btn.s { border-color:var(--accent4); color:var(--accent4); }
.btn.d { border-color:var(--accent2); color:var(--accent2); }
.btn.g { border-color:var(--accent); color:var(--accent); }
.cr { display:flex; align-items:center; gap:6px; }
.cl { font-size:8px; color:var(--textdim); letter-spacing:.07em; width:60px; flex-shrink:0; }
input[type=range] {
  flex:1; -webkit-appearance:none; height:2px;
  background:var(--dim); outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  background:var(--accent); border-radius:50%; cursor:pointer;
}
.sv { color:var(--accent3); font-size:9px; min-width:28px; }

#log {
  flex-shrink:0;
  height:90px;
  overflow-y:auto;
  padding:6px 10px;
  font-size:8px;
  line-height:1.7;
  background:var(--bg);
  -webkit-overflow-scrolling:touch;
  border-bottom:1px solid var(--border);
}
#log::-webkit-scrollbar { width:2px; }
#log::-webkit-scrollbar-thumb { background:var(--dim); }
.le { color:var(--textdim); }
.le.res { color:var(--accent); }
.le.prb { color:var(--accent3); }
.le.brth { color:var(--accent4); }
.le.dth { color:var(--accent2); }
.le.slp { color:#80b8ff; }
.le.txt { color:var(--text); }
.le.ans { color:var(--accent); font-style:italic; }

#ftr {
  flex-shrink:0;
  height:26px;
  background:var(--bg2);
  display:flex;
  align-items:center;
  padding:0 12px;
  gap:10px;
  font-size:8px;
  color:var(--textdim);
  padding-bottom:calc(2px + var(--safe-bottom));
}
.fval { color:var(--accent3); }

#sleep-overlay {
  position:fixed; inset:0;
  background:rgba(4,2,18,0);
  pointer-events:none;
  transition:background 1.5s;
  z-index:20;
}
#sleep-overlay.on { background:rgba(4,2,18,.78); }
#sleep-txt {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(20px,5vw,32px);
  color:var(--accent3);
  opacity:0;
  transition:opacity 1s;
  z-index:21;
  letter-spacing:.1em;
  pointer-events:none;
  text-align:center;
}
#sleep-txt.on { opacity:1; }
#res-flash {
  position:fixed; inset:0;
  background:rgba(95,255,192,0);
  pointer-events:none;
  z-index:15;
  transition:background .08s;
}
#res-flash.on { background:rgba(95,255,192,.07); }
</style>
</head>
<body>

<div id="sleep-overlay"></div>
<div id="sleep-txt">ночная оптимизация</div>
<div id="res-flash"></div>

<div id="hdr">
  <span class="logo">Rost/0k</span>
  <span class="hbadge" id="b-phase">рассвет</span>
  <span class="hbadge" id="b-state">бодрствует</span>
  <span class="hbadge" id="b-hunger">сыт</span>
  <div id="hdr-right">
    <div class="ebar"><div class="efill" id="efill" style="width:50%"></div></div>
    <span class="hval" id="s-energy">50%</span>
  </div>
</div>

<div id="graph-wrap">
  <span class="plabel">ψ · геометрия · α-фокус</span>
  <span id="node-count">N=0 E=0</span>
  <canvas id="gc"></canvas>
  <span id="focus-label"></span>
</div>

<div id="vision">
  <span class="vlabel">α · внимание</span>
  <span class="vmetric" id="vmet">τ=· H̄=·</span>
  <canvas id="vc"></canvas>
</div>

<div id="reflection">·</div>

<div id="input-zone">
  <input type="text" id="txt-input"
    placeholder="слово → если резонирует, ответит"
    autocomplete="off" autocorrect="off"
    autocapitalize="off" spellcheck="false">
  <button id="btn-send">→</button>
</div>

<div id="controls">
  <div class="brow">
    <button class="btn p" id="bn-snd">♫ звук</button>
    <button class="btn p" id="bn-img">◈ свет</button>
    <button class="btn p" id="bn-sym">∂ символ</button>
    <button class="btn s" id="bn-slp">💤 сон</button>
    <button class="btn g" id="bn-pau">пауза</button>
    <button class="btn d" id="bn-rst">сброс</button>
    <button class="btn s" id="bn-anl">◉ анализ</button>
    <button class="btn s" id="bn-mod">🎨 модальности</button>
  </div>
  <div class="cr">
    <span class="cl">ε прозвон</span>
    <input type="range" id="r-eps" min=".01" max=".3" step=".01" value=".07">
    <span class="sv" id="v-eps">.07</span>
  </div>
  <div class="cr">
    <span class="cl">скорость</span>
    <input type="range" id="r-spd" min="1" max="40" step="1" value="8">
    <span class="sv" id="v-spd">8</span>
  </div>
  <div class="cr">
    <span class="cl">рост N</span>
    <input type="range" id="r-grow" min="0" max="6" step="1" value="0">
    <span class="sv" id="v-grow">0..1</span>
  </div>
</div>

<div id="log"></div>

<div id="ftr">
  <span>шаг:<span class="fval" id="s-step">0</span></span>
  <span>N:<span class="fval" id="s-nodes">0</span></span>
  <span>△:<span class="fval" id="s-tri">0</span></span>
  <span>рез:<span class="fval" id="s-res">0</span></span>
  <span>отв:<span class="fval" id="s-ans">0</span></span>
  <span>жизнь:<span class="fval" id="s-life">1</span></span>
  <span style="margin-left:auto;color:var(--dim)">v1.7</span>
</div>

<script>
// ================================================================
// ПАРАМЕТРЫ
// ================================================================
const DT=.012, GAMMA=.011, NONLINEAR=.13, NORM_CLIP=2.2;
const ETA_W=.085, ALPHA_PI=.030, ALPHA_H=.020, BETA_H=.010;
const ETA_A=.020;
const D_IN=32;
const LR_T=.016;

const H_CLIP=4.5;
const H_SAT=2.0;
const H0_NODE=20;   // v1.4c: насыщение суммарной памяти узла. узел с Hi>>H0
                    // почти не получает преимущества — смягчённая иерархия,
                    // опытные весомее, но монополия памяти невозможна.
function hEff(h){ return h>0 ? Math.tanh(h/H_SAT)*H_SAT : 0; }
// насыщение суммарной памяти узла: линейно при малых Hi, плато при больших
function hSat(Hi){ return Math.tanh(Hi/H0_NODE)*H0_NODE; }

// Голод и энергия
const RESONANCE_THR=.055;
const ENERGY_WORD=6;
const ENERGY_BUTTON=3;
const ENERGY_BG=1;               // 0→1: фоновое узнавание даёт минимальное подкрепление (патч 3)
const ENERGY_DRAIN_BASE=.057;    // подобрано так чтобы при N=32 drain≈0.32 (как было)
const ENERGY_DRAIN_MIN=.18;      // пол — даже маленькая система не живёт вечно
const HUNGER_DEATH=0;

// Топология
// v1.6: MAX_NODES больше НЕ закон. Потолок N эмерджентен — его держит
// энергетическая цена узла (drain растёт как sqrt(Nalive)). HARD_CAP —
// лишь аварийный предохранитель против runaway-аллокации, не «биология».
// v1.6: ЛИМИТЫ ПО УЗЛАМ СНЯТЫ. Структура (глаз/капсид/расслоение ядро-оболочка)
// возникает САМА только при большом N — на фото v1.4 это N≈155. Поэтому потолок
// поднят высоко: пусть растёт, пока физика и бюджет позволяют. HARD_CAP теперь —
// лишь предохранитель от безудержной аллокации памяти, а не «биологический» предел.
const HARD_CAP=600;              // потолок N: запас над рабочими N≈150, телефон тянет
const MAX_DEGREE=18;
const DEATH_THR=.006;

// ── v1.6: МОРФОГЕНЕЗ — свободный N ──────────────────────────────
// Узлы рождаются и растворяются по НЕВЯЗКЕ среды, а не по нашему порогу.
// Невязка ребра (i,j) = насколько резко поле+память меняются между
// соседями, которых текущая дискретизация не может представить гладко:
//   resid(i,j) = W_PSI·|ψi−ψj|² + W_H·|Hi−Hj|   (только для связанных пар)
// Порог рождения/растворения — адаптивный (медиана+MAD по живым рёбрам),
// поэтому «что такое большая невязка» определяет сама система, а не число.
const MORPH_W_PSI=1.0;           // вклад градиента ψ в невязку
const MORPH_W_H=0.6;             // вклад разности памяти H в невязку (заказано: оба слоя)
const MORPH_BIRTH_K=1.8;         // рождение, если resid > median + K·MAD
const MORPH_DISSOLVE_K=-0.7;     // растворение, если resid < median + K·MAD (K<0 ⇒ ниже медианы)
const MORPH_PERIOD=40;           // как часто среда пересматривает топологию (шагов)
const MORPH_MAX_PER_STEP=1;      // не более одного события рождения за пересмотр (плавность)
const MORPH_MIN_AGE=600;         // узел нельзя растворить раньше этого возраста (даём созреть)
const MORPH_ALPHA_QUIET=.10;     // растворять только «тихие» узлы: α ниже этого
const MORPH_FLOOR=8;             // нижний предел живых узлов — ниже среда не опускается
const MORPH_RESID_HIST=240;      // окно истории невязок для медианы/MAD

// ── v1.6: ЛЁГКОЕ РАСТВОРЕНИЕ по «бесполезности» (апоптоз без сигналов) ──
// Развязано с ростом: НЕ зависит от текущей медианы невязки. Узел копит
// quietStreak — шаги подряд, когда он почти не получает α И несёт малую
// насыщенную память. Любой всплеск пользы обнуляет счётчик. Кто бесполезен
// долго и подряд — растворяется. Хабы и рабочие узлы не трогаются никогда.
// ── v1.6: БЮДЖЕТНОЕ РАСТВОРЕНИЕ (апоптоз по нехватке ресурса) ──────
// Локального признака «груза» в системе нет (внимание мерцает, память растёт
// у всех) — три попытки это показали. Единственный устойчивый сигнал —
// ГЛОБАЛЬНЫЙ баланс энергии: если приток за окно не покрывает drain, организм
// не может прокормить текущее N и сбрасывает узел из хвоста внимания. Голод
// форсирует ужимание ДО смерти. Потолок N тем самым ставит метаболизм.
const BUDGET_WINDOW=1000;        // окно скользящего энергобаланса (шагов)
const BUDGET_DEFICIT=-9.0;       // v1.6: ослаблено — бюджет ловит только настоящий
                                 // runaway-дефицит, не подрезает нормальный рост. N
                                 // дорастает до потолка/режима глаза, тормоз лишь
                                 // спасает от безудержного раздувания при голоде.
const BUDGET_TAIL_FRAC=.35;      // кандидат на сброс — из нижних 35% α

// v1.6 (план Б): КАПСИД БОЛЬШЕ НЕ ОТДЕЛЬНЫЙ РЕЖИМ. Раньше (до плана Б) был
// аппарат принудительной инкапсуляции при голоде с остановкой по эйлеровой χ.
// Он упёрся в то, что граф W — плотный объёмный, а не триангулированная
// поверхность, поэтому χ не сходилась к 2. Теперь капсид — ФОРМА ПОКОЯ
// свободной мембранной физики (K_MEMBRANE против K_REP): оболочка строится
// сама как баланс распирания и поверхностного натяжения, без χ и без лавины.

// Циркадный — орбитальная механика (v1.7)
// Солнце: суточная высота над горизонтом → световой фон (зенит = максимум).
// Луна: обращение вокруг барицентра Земля–Луна, отражённый свет ночью.
const DAY_LEN     = 1600;        // длина солнечных суток в шагах (= старый CIRCADIAN)
const CIRCADIAN   = DAY_LEN;     // alias для совместимости со старым кодом
const MOON_PERIOD = 1600*27.3/24;// лунный месяц ≈ 27.3 суток (синодика ниже выводится сама)
// Барицентр: радиус орбиты тела ∝ массе ПАРТНЁРА (тяжёлое тело почти неподвижно).
const M_EARTH = 81.3;            // масса Земли в массах Луны (реальное соотношение)
const M_MOON  = 1.0;
const BARY_A  = 0.30;            // большая полуось системы (в условных экранных единицах)
const SUN_TILT = 0.0;            // наклон эклиптики к «горизонту» наблюдателя (0..1), 0 = солнце доходит до зенита
const MOON_ALBEDO = 0.16;        // во сколько раз ночной лунный фон слабее полуденного солнечного

// α-внимание
const ALPHA_LR=.06;
const ALPHA_NOISE_BASE=.04;
const TAU_MIN=.15, TAU_MAX=2.5;
const ALPHA_GAIN=3.0;
const ALPHA_LEARN_GAIN=2.0;
const ATT_FOCUS=.04;
const ATT_FOCUS_THR=.3;
const ANSWER_RES_MULT=1.2;       // 1.6→1.2: окно ответа шире
const ANSWER_HISTORY=50;

const ANSWER_ENTROPY_MAX=.75;    // .55→.75: «рабочий фокус» теперь тоже считается фокусом

const ECHO_STRENGTH=.18;       // v0.96: .28→.18, мягче наследование структуры
const ECHO_WORDS_KEEP=6;

// v1.6: СМЕРТЬ ПО СТАРОСТИ УБРАНА как закон. В 1.5 MAX_AGE был костылём
// против NaN (наблюдался ~94k, N=144). Настоящая причина — раскрутка петли
// ψ→R→ψ; в 1.6 она лечится насыщением R (см. LOOP_* и updateField/updateGeom),
// а монотонный рост N к зоне переполнения снят морфогенезом (растворение).
// Поэтому смерть снова честная — только голод. Эхо различает старость по
// прожитым шагам (для ECHO_WORDS_KEEP_OLD), но это уже не причина смерти.
const OLD_AGE_HINT=120000;     // «прожил долго» для богатого эха — НЕ предел жизни
const ECHO_WORDS_KEEP_OLD=12;  // долгая жизнь сохраняет вдвое больше слов

function healthCheck(){
  let fixed=0;
  for(let i=0;i<N;i++){
    if(!isFinite(psiRe[i])||!isFinite(psiIm[i])||Math.abs(psiRe[i])>10||Math.abs(psiIm[i])>10){
      psiRe[i]=(Math.random()-.5)*.2;
      psiIm[i]=(Math.random()-.5)*.2;
      fixed++;
    }
  }
  for(let k=0;k<N*D_IN;k++){
    if(!isFinite(TRe[k])||Math.abs(TRe[k])>1.5){TRe[k]=(Math.random()-.5)*.1;fixed++;}
    if(!isFinite(TIm[k])||Math.abs(TIm[k])>1.5){TIm[k]=(Math.random()-.5)*.1;fixed++;}
  }
  for(let k=0;k<N*N;k++){
    if(!isFinite(H[k])||H[k]<0) H[k]=0;
    if(!isFinite(W[k])||W[k]<0) W[k]=0;
  }
  if(fixed>0) slog('⚕ healthCheck: восстановлено '+fixed,'le dth');
}

  { let cx=0,cy=0,cz=0; for(let i=0;i<N;i++){cx+=pos[i][0];cy+=pos[i][1];cz+=pos[i][2];}

function buildPos(){
  pos=[];
  if(N===0) return;
  // v1.5: росток — маленькая сфера, лежащая на поверхности планеты.
  // центр ростка поднят на (R_PLANET + его радиус) по оси Y, чтобы он
  // стартовал чуть над землёй и осел под гравитацией.
  const phi=Math.PI*(Math.sqrt(5)-1);
  const rb=0.88;                    // радиус самого ростка
  const cy=PLANET_R+rb*0.6;         // центр ростка над поверхностью
  for(let i=0;i<N;i++){
    const y=1-2*i/(Math.max(N-1,1));
    const r=Math.sqrt(Math.max(0,1-y*y));
    const th=phi*i;
    pos.push([r*Math.cos(th)*rb, cy + y*rb, r*Math.sin(th)*rb]);
  }
}

// v1.3: собственные частоты узлов берутся из их широты на капсиде.
// полюса — низкочастотные (бас), экватор — высокочастотные.
// орган неоднороден: есть зоны звука и зоны света.
function initOmega(){
  if(!nodeOmega||nodeOmega.length!==N) nodeOmega=new Float64Array(N);
  for(let i=0;i<N;i++){
    const y=pos[i] ? pos[i][1] : 0;
    const t=(y/0.88+1)/2;                  // 0..1 по широте
    nodeOmega[i]=BAND_SOUND[0]+t*(BAND_LIGHT[1]-BAND_SOUND[0]);
  }
}

function physics3D(){
  if(N===0) return;
  const K_REP=0.006;    // v1.2: сильнее — предотвращает схлопывание
  // v1.4: грани больше не тянут к центру — они держат равновесную ПЛОЩАДЬ.
  // оболочка возникает как баланс натяжения граней, без внешней сферы.
  const K_AREA=0.10;    // жёсткость натяжения грани
  const AREA0=0.13;     // равновесная площадь грани (~равностор. треуг. со стороной σ)
  // v1.5: ПЛАНЕТА. центр мира в начале координат. росток лежит на поверхности
  // сферы радиуса R_PLANET. K_CENTER теперь держит росток вместе (тяга к его
  // собственному центроиду), а НЕ к нулю — иначе он упал бы в ядро планеты.
  const K_COHERE=0.0010;// v1.4c: сплочённость ростка к центроиду (дала глаз/капсид сама)
  const G_GRAV=0.0;     // гравитация к планете убрана (росток свободен)
                        // в ~5 раз слабее натяжения грани — росток ляжет,
                        // сплющится, но форма устоит, не растечётся.
  const R_PLANET=PLANET_R; // радиус планеты (≈25× ростка), задан глобально
  const DAMP=0.78;
  const DT3=0.013;
  const MIN_DIST=0.08;  // v1.2: жёсткий минимум расстояния

  // центр масс ростка — к нему тянет K_COHERE (сплочённость, не падение в ядро)
  let cmx=0,cmy=0,cmz=0,cn=0;
  for(let i=0;i<N;i++){ if(!alive[i])continue; cmx+=pos[i][0]; cmy+=pos[i][1]; cmz+=pos[i][2]; cn++; }
  if(cn>0){ cmx/=cn; cmy/=cn; cmz/=cn; }

  const fx=new Float64Array(N), fy=new Float64Array(N), fz=new Float64Array(N);

  for(let i=0;i<N;i++){ if(!alive[i])continue; for(let j=i+1;j<N;j++){ if(!alive[j])continue;
    const dx=pos[i][0]-pos[j][0];
    const dy=pos[i][1]-pos[j][1];
    const dz=pos[i][2]-pos[j][2];
    const d2=dx*dx+dy*dy+dz*dz;
    const d=Math.sqrt(d2)+0.0001;
    // жёсткое отталкивание на малых расстояниях
    const f = d < MIN_DIST
      ? K_REP*10/(d2+0.0001)   // очень сильно если слишком близко
      : K_REP/d2;
    fx[i]+=f*dx; fy[i]+=f*dy; fz[i]+=f*dz;
    fx[j]-=f*dx; fy[j]-=f*dy; fz[j]-=f*dz;
  }}

  // v1.4: НАТЯЖЕНИЕ ГРАНЕЙ — каждая грань держит равновесную площадь A0.
  // грань меньше A0 распирается, больше — стягивается. сила лежит в плоскости
  // грани (перпендикулярно противоположному ребру), поэтому грань держит форму,
  // а не схлопывается в точку. сумма всех граней = упругая оболочка.
  for(let s=0;s<S2.length;s++){
    const [a,b,c]=S2[s];
    if(a>=N||b>=N||c>=N) continue;
    if(!alive[a]||!alive[b]||!alive[c]) continue;  // v1.6
    const h=H2[s]; if(h<0.02) continue;
    const ax=pos[a][0], ay=pos[a][1], az=pos[a][2];
    const bx=pos[b][0], by=pos[b][1], bz=pos[b][2];
    const cx=pos[c][0], cy=pos[c][1], cz=pos[c][2];
    // рёбра от a
    const e1x=bx-ax, e1y=by-ay, e1z=bz-az;
    const e2x=cx-ax, e2y=cy-ay, e2z=cz-az;
    // нормаль = e1 × e2, |нормаль| = 2·площадь
    const nx=e1y*e2z-e1z*e2y;
    const ny=e1z*e2x-e1x*e2z;
    const nz=e1x*e2y-e1y*e2x;
    const twoA=Math.sqrt(nx*nx+ny*ny+nz*nz)+1e-9;
    const area=twoA*0.5;
    // упругий коэффициент: натяжение тем сильнее, чем сильнее грань (h)
    const k=K_AREA*h*(area-AREA0)/twoA;  // знак: area>A0 → стянуть
    // единичная нормаль
    const ux=nx/twoA, uy=ny/twoA, uz=nz/twoA;
    // ∂A/∂r = (нормаль × ребро_противоположное)/(4A); сила = -k_elastic·∂A/∂r
    // для вершины a противоположное ребро (c-b); для b: (a-c); для c: (b-a)
    const edges=[
      [a, cx-bx, cy-by, cz-bz],
      [b, ax-cx, ay-cy, az-cz],
      [c, bx-ax, by-ay, bz-az]
    ];
    for(const [vi, ex, ey, ez] of edges){
      // grad = û × ребро  (направление в плоскости грани, наружу/внутрь)
      const gx=uy*ez-uz*ey;
      const gy=uz*ex-ux*ez;
      const gz=ux*ey-uy*ex;
      // сила возврата площади: -(area-A0)·grad·жёсткость
      fx[vi]-=k*gx; fy[vi]-=k*gy; fz[vi]-=k*gz;
    }
  }

  // v1.6: физика как в 1.4c — простая когезия к центроиду + грани + отталкивание.
  // Капсид/глаз/расслоение ядро-оболочка возникают САМИ при большом N (видно на
  // фото v1.4: тёмная линза-глаз, свёрнутый капюшон-оболочка). Не форсируем силами.
  for(let i=0;i<N;i++){
    if(!alive[i]) continue;
    if(!vel[i]) vel[i]=[0,0,0];
    const px=pos[i][0], py=pos[i][1], pz=pos[i][2];
    vel[i][0]=(vel[i][0]+fx[i]*DT3)*DAMP - (px-cmx)*K_COHERE;
    vel[i][1]=(vel[i][1]+fy[i]*DT3)*DAMP - (py-cmy)*K_COHERE;
    vel[i][2]=(vel[i][2]+fz[i]*DT3)*DAMP - (pz-cmz)*K_COHERE;
    pos[i][0]+=vel[i][0];
    pos[i][1]+=vel[i][1];
    pos[i][2]+=vel[i][2];
  }
}

// ================================================================
// ЛАПЛАСИАН — v1.1: веса из геометрии, W = кеш расстояний
// ================================================================
function buildL(){
  const LsRe=new Float64Array(N*N), LAIm=new Float64Array(N*N);
  // пересчитываем W из текущих 3D позиций (v1.6: только между живыми узлами)
  for(let i=0;i<N;i++){ if(!alive[i])continue; for(let j=i+1;j<N;j++){ if(!alive[j])continue;
    const dx=pos[i][0]-pos[j][0];
    const dy=pos[i][1]-pos[j][1];
    const dz=pos[i][2]-pos[j][2];
    const r2=dx*dx+dy*dy+dz*dz;
    // гауссово ядро: близкие узлы сильно связаны, дальние — нет
    const w=Math.exp(-r2/GEO_SIGMA2);
    const wEff=w>GEO_W_MIN ? w : 0;
    W[i*N+j]=wEff; W[j*N+i]=wEff;
  }}
  // строим лапласиан из обновлённых W (надгробия → нулевая строка/столбец)
  for(let i=0;i<N;i++){
    if(!alive[i]) continue;   // строка надгробия остаётся нулевой
    let d=0; for(let j=0;j<N;j++){ if(!alive[j])continue; d+=W[i*N+j]; }
    for(let j=0;j<N;j++){
      if(!alive[j]) continue;
      LsRe[i*N+j]=i===j?d:-W[i*N+j];
      LAIm[i*N+j]=A[i*N+j];
    }
  }
  return{LsRe,LAIm};
}

// ================================================================
// α-ВНИМАНИЕ
// ================================================================
function currentTau(){
  const t=energy/100;
  return TAU_MIN+(TAU_MAX-TAU_MIN)*t;
}

function softmax(logits, tau){
  const out=new Float64Array(logits.length);
  let mx=-Infinity;
  for(let i=0;i<logits.length;i++) if(logits[i]/tau>mx) mx=logits[i]/tau;
  let s=0;
  for(let i=0;i<logits.length;i++){
    out[i]=Math.exp(logits[i]/tau-mx);
    s+=out[i];
  }
  if(s<1e-12) return out;
  for(let i=0;i<logits.length;i++) out[i]/=s;
  return out;
}

function entropy(p){
  // v1.6: энтропия нормируется по ЖИВЫМ узлам (Nalive), не по длине массива,
  // иначе накопленные надгробия занижали бы H̄(α) и ломали гейт ответа.
  let h=0;
  for(let i=0;i<p.length;i++) if(p[i]>1e-12) h-=p[i]*Math.log(p[i]);
  const denom=Math.log(Math.max(2,Nalive));
  return h/denom;
}

function updateAlpha(predErr){
  const tau=currentTau();
  const noise=ALPHA_NOISE_BASE*(0.4+0.6*energy/100);

  let meanLogit=0;
  for(let i=0;i<N;i++) meanLogit+=alphaLogit[i];
  meanLogit/=N;
  let aMax=0;
  for(let i=0;i<N;i++) if(alpha[i]>aMax) aMax=alpha[i];
  const focusFactor=Math.max(0, aMax-ATT_FOCUS_THR);
  const pullForce=ATT_FOCUS*focusFactor;

  for(let i=0;i<N;i++){
    let Hi=0, geoDeg=0;
    for(let j=0;j<N;j++){
      Hi+=hEff(H[i*N+j]);
      if(W[i*N+j]>GEO_W_MIN) geoDeg++; // геометрическая степень
    }
    const amp=Math.sqrt(psiRe[i]**2+psiIm[i]**2);
    // v1.4b: ЦЕНА КОНЦЕНТРАЦИИ — сверхлинейна по степени.
    // линейный cost проигрывал, т.к. выгода Hi тоже росла со связями → один узел
    // становился олигархом (degree~18, Hi~200, весь α утекал в него).
    // квадратичная цена даёт оптимальную степень: выше неё расти невыгодно.
    // это латеральное торможение через метаболизм — хаб дорого содержать.
    const cost=geoDeg*.004 + geoDeg*geoDeg*.030;
    const target=hSat(Hi)*1.2 + amp*0.8 - cost + predErr*0.3*Math.random();
    alphaLogit[i]+=ALPHA_LR*(target-alphaLogit[i]) + (Math.random()-.5)*noise;
    alphaLogit[i]+=pullForce*(meanLogit-alphaLogit[i]);
    alphaLogit[i]*=.998;
  }
  alpha=softmax(alphaLogit, tau);
  // v1.6: надгробия не получают внимания. Обнуляем и перенормируем по живым,
  // иначе мёртвые узлы крали бы долю α и искажали энтропию-гейт ответа.
  let asum=0;
  for(let i=0;i<N;i++){ if(!alive[i]) alpha[i]=0; asum+=alpha[i]; }
  if(asum>1e-12) for(let i=0;i<N;i++) alpha[i]/=asum;
}

function alphaArgmax(){
  let mx=-1,k=0;
  for(let i=0;i<N;i++) if(alpha[i]>mx){mx=alpha[i];k=i;}
  return k;
}

function chooseModalityByAlpha(){
  const agg=[0,0,0];
  for(let i=0;i<N;i++) for(let k=0;k<3;k++){
    agg[k]+=alpha[i]*modPref[i][k];
  }
  for(let k=0;k<3;k++) agg[k]+=(Math.random()-.5)*MOD_NOISE;
  let mx=Math.max(agg[0],agg[1],agg[2]);
  const ex=[Math.exp(agg[0]-mx),Math.exp(agg[1]-mx),Math.exp(agg[2]-mx)];
  const s=ex[0]+ex[1]+ex[2];
  const r=Math.random()*s;
  let acc=0;
  for(let k=0;k<3;k++){acc+=ex[k]; if(r<=acc) return MODALITIES[k];}
  return MODALITIES[2];
}

function reinforceModality(focusNode, modIdx){
  // v1.6 (вариант 2): вход формирует модальность узла. Раньше подкреплялся
  // только фокусный узел — специализация была слишком разреженной, кластеры
  // не успевали разойтись по модальностям. Теперь подкрепляем ВСЕ узлы,
  // которые активно участвовали (по α), пропорционально вниманию. Так узлы,
  // часто ловящие звук, становятся «звуковыми», ловящие свет — «световыми»,
  // и кластеры получают шанс специализироваться (разделение труда).
  let aMaxNow=0;
  for(let i=0;i<N;i++) if(alive[i]&&alpha[i]>aMaxNow) aMaxNow=alpha[i];
  if(aMaxNow<1e-9) aMaxNow=1;
  for(let i=0;i<N;i++){
    if(!alive[i]) continue;
    const aRel=alpha[i]/aMaxNow;
    if(aRel<0.15) continue;                 // только заметно участвовавшие узлы
    const mp=modPref[i];
    mp[modIdx]+=MOD_LR*aRel;                 // подкрепление ∝ вниманию узла
    // мягкая нормировка к симплексу без ухода в минус:
    const s=mp[0]+mp[1]+mp[2];
    if(s>1){ mp[0]/=s; mp[1]/=s; mp[2]/=s; } // держим сумму ≤1, доли неотрицательны
  }
}

function pickBirthParent(){
  const score=new Float64Array(N);
  let mx=0;
  let aMaxNow=0;
  for(let i=0;i<N;i++) if(alpha[i]>aMaxNow) aMaxNow=alpha[i];
  if(aMaxNow<1e-9) aMaxNow=1;
  for(let i=0;i<N;i++){
    let s=0; for(let j=0;j<N;j++) s+=hEff(H[i*N+j]);
    const aRel=alpha[i]/aMaxNow;
    score[i]=hSat(s)*(0.3+aRel*0.7);  // v1.4c: насыщение — не даём олигарху захватить рождение
    if(score[i]>mx) mx=score[i];
  }
  if(mx<1e-9) return -1;
  const tot=score.reduce((a,b)=>a+b,0);
  if(tot<1e-9) return -1;
  let r=Math.random()*tot, acc=0;
  for(let i=0;i<N;i++){acc+=score[i]; if(r<=acc) return i;}
  return N-1;
}

function captureEcho(byAge){
  echoH=new Float64Array(N*N);
  echoH.set(H);
  echoN=N;
  echoPos=pos.map(p=>[p[0],p[1]]);
  // v0.94: сохраняем α-профиль — наследуемый «темперамент»
  echoAlpha=new Float64Array(N);
  echoAlpha.set(alpha);
  const all=new Map();
  for(const m of nodeMemory) for(const [w,c] of m){
    all.set(w,(all.get(w)||0)+c);
  }
  // v1.5: старость сохраняет вдвое больше слов — богаче опыт
  const keep = byAge ? ECHO_WORDS_KEEP_OLD : ECHO_WORDS_KEEP;
  echoWords=[...all].map(([w,c])=>({word:w,count:c}))
    .sort((a,b)=>b.count-a.count)
    .slice(0,keep);
  // v0.99: сохраняем треугольники для наследования
  echoS2=S2.map(t=>[...t]);
  echoH2=[...H2];
  echoReady=true;
}

// ================================================================
// ПОЛЕ
// ================================================================
function updateField(LsRe,LAIm){
  const nR=new Float64Array(N), nI=new Float64Array(N);
  const gMin=.5, gMax=1.5;
  let amax=0; for(let i=0;i<N;i++) if(alpha[i]>amax) amax=alpha[i];
  const aScale=amax>0?amax:1;

  for(let i=0;i<N;i++){
    if(!alive[i]){ nR[i]=0; nI[i]=0; continue; }   // v1.6: надгробия не эволюционируют
    const g=gMin+(gMax-gMin)*(alpha[i]/aScale);
    let lR=0,lI=0,rR=0,rI=0;
    for(let j=0;j<N;j++){
      if(!alive[j]) continue;                       // v1.6: связи с надгробиями молчат
      lR+=LsRe[i*N+j]*psiRe[j]-LAIm[i*N+j]*psiIm[j];
      lI+=LsRe[i*N+j]*psiIm[j]+LAIm[i*N+j]*psiRe[j];
      rR+=R[i*N+j]*psiRe[j];
      rI+=R[i*N+j]*psiIm[j];
    }
    const n2=psiRe[i]**2+psiIm[i]**2, nl=NONLINEAR*(1-n2);
    const gammaEff=GAMMA*(2.0-g);
    // v1.6: НАСЫЩЕНИЕ петли R→ψ. Раньше член rR·.04 был линейным и при росте R
    // раскручивал экспоненту ψ→R→ψ → Inf → NaN (корень бага ~94k шага).
    // tanh ограничивает обратную связь: сильный резонанс больше НЕ уходит в разнос.
    const fbR=LOOP_FB_SAT*Math.tanh(rR*LOOP_FB/LOOP_FB_SAT);
    const fbI=LOOP_FB_SAT*Math.tanh(rI*LOOP_FB/LOOP_FB_SAT);
    nR[i]=psiRe[i]+DT*g*(lI - gammaEff*psiRe[i]/g + nl*psiRe[i] + fbR);
    nI[i]=psiIm[i]+DT*g*(-lR - gammaEff*psiIm[i]/g + nl*psiIm[i] + fbI);
    // v1.3: собственная прецессия — узел крутит фазу со своей ω.
    // это делает частоту настоящим свойством приёмника: узел резонирует
    // на входной сигнал той полосы, что близка к его ω.
    if(nodeOmega){
      const dPh=nodeOmega[i]*OMEGA_PSI*DT;
      const cs=Math.cos(dPh), sn=Math.sin(dPh);
      const rr=nR[i]*cs - nI[i]*sn;
      const ii=nR[i]*sn + nI[i]*cs;
      nR[i]=rr; nI[i]=ii;
    }
    const nm=Math.sqrt(nR[i]**2+nI[i]**2);
    if(nm>NORM_CLIP){nR[i]*=NORM_CLIP/nm;nI[i]*=NORM_CLIP/nm;}
  }
  psiRe.set(nR); psiIm.set(nI);
}

// ================================================================
// ГЕОМЕТРИЯ — v1.1: двусторонняя связь поля и пространства
// ================================================================
function updateGeom(LsRe,LAIm){
  // H накапливается от волнового перекрытия в реальном пространстве
  // J-ток и A остаются как раньше
  for(let i=0;i<N;i++) for(let j=0;j<N;j++){
    const dr=psiRe[i]-psiRe[j], di=psiIm[i]-psiIm[j];
    const K=dr*dr+di*di;
    // геометрический вес: перекрытие волновых функций зависит от расстояния
    const gw=W[i*N+j]; // уже пересчитан в buildL из расстояний
    const Lre=LsRe[i*N+j], Lim=LAIm[i*N+j];
    const Lpre=Lre*psiRe[j]-Lim*psiIm[j];
    const Lpim=Lre*psiIm[j]+Lim*psiRe[j];
    const J=psiRe[i]*Lpim-psiIm[i]*Lpre;
    // v1.4a: H снова копится от ψ-разности НАПРЯМУ, без удушения геометрией.
    // gw работает мягким вентилем: между связанными узлами (gw значим) H растёт
    // полноценно; между совсем далёкими — приглушённо. это возвращает созревание
    // узлов, которое в v1.4 заморозилось (узлы разъехались, gw умер, H не рос).
    const gate=0.4+0.6*Math.min(1,gw/GEO_W_MIN/3);  // 0.4..1.0
    let nH=H[i*N+j]+DT*(ALPHA_H*K*gate - GEO_H_DECAY*H[i*N+j]);
    if(nH<0) nH=0;
    if(nH>H_CLIP) nH=H_CLIP;
    H[i*N+j]=nH;
    if(i<j){
      const nA=A[i*N+j]+DT*(-ETA_A*A[i*N+j]+.038*J);
      A[i*N+j]=nA; A[j*N+i]=-nA;
    }
    if(i<j){
      const ai=psiRe[i]**2+psiIm[i]**2;
      const aj=psiRe[j]**2+psiIm[j]**2;
      const dR=.07*(ai*aj*hEff(H[i*N+j])*gw)-.014*R[i*N+j];
      let nR=R[i*N+j]+DT*dR;
      // v1.6: жёсткий потолок R — второй конец стабилизации петли ψ→R→ψ.
      if(nR>LOOP_R_CLIP) nR=LOOP_R_CLIP; else if(nR<-LOOP_R_CLIP) nR=-LOOP_R_CLIP;
      R[i*N+j]=nR; R[j*N+i]=nR;
    }
  }

  // ── v1.1: ψ двигает узлы в пространстве ──────────────────────
  // узлы с большой ψ-разностью отталкиваются геометрически
  // узлы с малой ψ-разностью (синхронные) притягиваются
  // это замыкает петлю: геометрия → W → ψ → геометрия
  for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
    if(!vel[i]) vel[i]=[0,0,0];
    if(!vel[j]) vel[j]=[0,0,0];
    const gw=W[i*N+j]; if(gw<GEO_W_MIN) continue;
    const dx=pos[i][0]-pos[j][0];
    const dy=pos[i][1]-pos[j][1];
    const dz=pos[i][2]-pos[j][2];
    const r=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;
    // ψ-разность: большая → узлы расталкиваются; маленькая → стягиваются
    const dpRe=psiRe[i]-psiRe[j], dpIm=psiIm[i]-psiIm[j];
    const psiDiff=dpRe*dpRe+dpIm*dpIm;
    // целевое расстояние: синхронные узлы хотят быть ближе
    const rTarget=GEO_SIGMA*(0.4+0.6*psiDiff);
    const f=GEO_PSI_FORCE*gw*(r-rTarget)/r;
    vel[i][0]-=f*dx; vel[i][1]-=f*dy; vel[i][2]-=f*dz;
    vel[j][0]+=f*dx; vel[j][1]+=f*dy; vel[j][2]+=f*dz;
  }

  // Pi и W-динамика: теперь W диктуется геометрией, Pi управляет
  // только памятью о «желаемой» близости
  for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
    const K=(psiRe[i]-psiRe[j])**2+(psiIm[i]-psiIm[j])**2;
    const tgt=.42*Math.tanh(3*K)+.26*hEff(H[i*N+j]);
    const dP=-ALPHA_PI*Pi[i*N+j]-ETA_W*(W[i*N+j]-tgt);
    Pi[i*N+j]+=DT*dP; Pi[j*N+i]=Pi[i*N+j];
  }

  enforceMaxDegree();
}

function enforceMaxDegree(){
  for(let i=0;i<N;i++){
    const nbr=[];
    for(let j=0;j<N;j++) if(i!==j && W[i*N+j]>DEATH_THR) nbr.push([j, W[i*N+j]]);
    if(nbr.length<=MAX_DEGREE) continue;
    nbr.sort((a,b)=>b[1]-a[1]);
    for(let k=MAX_DEGREE;k<nbr.length;k++){
      const j=nbr[k][0];
      W[i*N+j]=0; W[j*N+i]=0;
    }
  }
}
const BIRTH_THR=.12;

// ================================================================
// T
// ================================================================
function applyT(x, modIdx){
  // v1.6: СЕНСОРНАЯ ТОПОГРАФИЯ. Раньше любой вход бил во все узлы одинаково —
  // кластеры не могли специализироваться (все «звук»). Теперь вход модальности
  // m входит сильнее в узлы, чья частота nodeOmega соответствует её полосе:
  // звук → низкочастотные узлы, свет → высокочастотные, символ → средние.
  // Так разные модальности возбуждают разные ЗОНЫ графа → разделение труда.
  const pR=new Float64Array(N), pI=new Float64Array(N);
  // центр полосы модальности в пространстве omega
  let bandC=null, bandW=0;
  if(typeof modIdx==='number' && modIdx>=0 && modIdx<3){
    const lo=BAND_SOUND[0], hi=BAND_LIGHT[1], span=hi-lo;
    bandC = modIdx===0 ? lo+span*0.18      // звук — низ
          : modIdx===1 ? lo+span*0.82      // свет — верх
          :              lo+span*0.5;       // символ — середина
    bandW = span*0.30;                       // ширина зоны чувствительности
  }
  for(let i=0;i<N;i++){
    let r=0,im=0;
    for(let d=0;d<D_IN;d++){r+=TRe[i*D_IN+d]*x[d];im+=TIm[i*D_IN+d]*x[d];}
    if(bandC!==null){
      // гауссова чувствительность по близости частоты узла к полосе модальности
      const dz=(nodeOmega[i]-bandC)/bandW;
      const gain=0.25+0.75*Math.exp(-dz*dz);   // зона: ~1.0, вне: ~0.25 (не глушим совсем)
      r*=gain; im*=gain;
    }
    pR[i]=r; pI[i]=im;
  }
  return{pR,pI};
}

function learnT(x,wasRes){
  const sign=wasRes?1:-.25;
  const hV=new Float64Array(N);
  for(let i=0;i<N;i++){let s=0;for(let j=0;j<N;j++)s+=hEff(H[i*N+j]);hV[i]=Math.min(s,6);}
  let aMaxNow=0;
  for(let i=0;i<N;i++) if(alpha[i]>aMaxNow) aMaxNow=alpha[i];
  if(aMaxNow<1e-9) aMaxNow=1;
  for(let i=0;i<N;i++){
    const aRel=alpha[i]/aMaxNow;
    const w=hV[i]*(0.5+aRel*ALPHA_LEARN_GAIN);
    for(let d=0;d<D_IN;d++){
      TRe[i*D_IN+d]+=sign*LR_T*w*x[d];
      TIm[i*D_IN+d]+=sign*LR_T*w*x[d];
    }
  }
  for(let i=0;i<N;i++){
    let nm=1e-9;
    for(let d=0;d<D_IN;d++) nm+=TRe[i*D_IN+d]**2+TIm[i*D_IN+d]**2;
    nm=Math.sqrt(nm);
    const sc=Math.min(1,.45/nm);
    for(let d=0;d<D_IN;d++){TRe[i*D_IN+d]*=sc;TIm[i*D_IN+d]*=sc;}
  }
}

function probe(x,label,word,modIdx,eGain){
  if(dead) return {res:0,isR:false};
  if(typeof eGain!=='number') eGain=ENERGY_BUTTON;
  const base=new Float64Array(N);
  for(let i=0;i<N;i++) base[i]=Math.sqrt(psiRe[i]**2+psiIm[i]**2);
  const{pR,pI}=applyT(x, modIdx);

  let aMaxNow=0;
  for(let i=0;i<N;i++) if(alpha[i]>aMaxNow) aMaxNow=alpha[i];
  if(aMaxNow<1e-9) aMaxNow=1;

  let res=0, predErr=0;
  for(let i=0;i<N;i++){
    if(!alive[i]) continue;   // v1.6: надгробия не дают и не размывают резонанс
    const tR=psiRe[i]+eps*pR[i], tI=psiIm[i]+eps*pI[i];
    const nm=Math.sqrt(tR**2+tI**2);
    let hs=0; for(let j=0;j<N;j++){ if(!alive[j])continue; hs+=hEff(H[i*N+j]); }
    const d=Math.abs(nm-base[i]);
    const aRel=alpha[i]/aMaxNow;
    res+=d*(1+Math.min(hs,8)*.5)*(0.5+aRel*ALPHA_GAIN);
    predErr+=d;
  }
  res/=Nalive;
  predErr/=Nalive;

  const isR=res>RESONANCE_THR;
  const aEnt=entropy(alpha);
  const focusNode=alphaArgmax();

  if(isR){
    for(let i=0;i<N;i++){
      psiRe[i]+=eps*pR[i]; psiIm[i]+=eps*pI[i];
      const nm=Math.sqrt(psiRe[i]**2+psiIm[i]**2);
      if(nm>NORM_CLIP){psiRe[i]*=NORM_CLIP/nm;psiIm[i]*=NORM_CLIP/nm;}
    }
    energy=Math.min(100,energy+eGain);
    eInAcc+=eGain;   // v1.6: учёт притока в бюджет
    totalRes++;
    flash();
    const eStr = eGain>0 ? ' +'+eGain+'E' : '';
    slog('✦ резонанс ['+label+'] r='+res.toFixed(3)+eStr,'le res');

    if(typeof modIdx==='number' && modIdx>=0 && modIdx<3){
      reinforceModality(focusNode, modIdx);
    }

    if(word){
      const m=nodeMemory[focusNode];
      m.set(word,(m.get(word)||0)+1);
    } else if(typeof modIdx==='number' && modIdx>=0 && modIdx<3){
      // ПАТЧ: кнопочные/фоновые зонды тоже оставляют след — имя модальности
      // это позволяет эху переносить не только структуру, но и «опыт»
      const m=nodeMemory[focusNode];
      const key=':'+MODALITIES[modIdx];  // двоеточие чтобы отличать от обычных слов
      m.set(key,(m.get(key)||0)+1);
    }

    let resMedian=0;
    if(resonanceHistory.length>=10){
      const sorted=[...resonanceHistory].sort((a,b)=>a-b);
      resMedian=sorted[Math.floor(sorted.length/2)];
    }
    const answerThr=Math.max(resMedian*ANSWER_RES_MULT, 0.05);
    // ПАТЧ: ответ возможен и без word — модальность работает как псевдо-якорь
    // word для текста, иначе имя модальности (sound/image/symbol)
    const triggerKey = word || (typeof modIdx==='number' && modIdx>=0 && modIdx<3 ? MODALITIES[modIdx] : null);
    if(triggerKey && res>answerThr && aEnt<ANSWER_ENTROPY_MAX){
      tryAnswer(focusNode, triggerKey);
    }
  } else {
    slog('· '+label+' r='+res.toFixed(3),'le prb');
  }

  learnT(x,isR);
  updateAlpha(predErr);
  resonanceHistory.push(res);
  if(resonanceHistory.length>ANSWER_HISTORY) resonanceHistory.shift();
  return{res,isR};
}

function tryAnswer(focusNode, inputWord){
  if(step-lastAnswerStep<40) return;  // 60→40: чуть свободнее
  const m=nodeMemory[focusNode];
  const cand=new Map();
  for(let i=0;i<N;i++){
    const w=(i===focusNode)?1.5 : (W[focusNode*N+i]>DEATH_THR ? W[focusNode*N+i]*5 : 0);
    if(w<=0) continue;
    for(const [word,c] of nodeMemory[i]){
      if(word===inputWord) continue;
      cand.set(word,(cand.get(word)||0)+c*w);
    }
  }

  // ПАТЧ: молчание вместо мусора
  // если в окрестности фокуса вообще нет ассоциативной памяти — не отвечать
  // (символьный код имеет смысл только когда есть выбор формата, не как fallback)
  if(cand.size===0) return;

  const mode=totalAns%2;
  let answer;
  if(mode===0){
    // слово из памяти — самое связанное
    let best='',bv=-1;
    for(const [w,v] of cand) if(v>bv){bv=v;best=w;}
    answer=best;
  } else {
    // символьный код узла — но только если cand непустой
    const ph=Math.atan2(psiIm[focusNode],psiRe[focusNode]);
    let hSum=0; for(let j=0;j<N;j++) hSum+=hEff(H[focusNode*N+j]);
    const phChar='∠'+(ph>=0?'+':'')+(ph/Math.PI).toFixed(2)+'π';
    answer='⟨'+focusNode+' '+phChar+' h='+hSum.toFixed(1)+'⟩';
  }

  lastAnswer=answer;
  lastAnswerStep=step;
  totalAns++;
  slog('→ '+answer,'le ans');
}

function flash(){
  const el=document.getElementById('res-flash');
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),150);
}

// когерентная дистанция тройки — ψ-разность + геометрия
function coherence3(i,j,k){
  const dr1=psiRe[i]-psiRe[j], di1=psiIm[i]-psiIm[j];
  const dr2=psiRe[j]-psiRe[k], di2=psiIm[j]-psiIm[k];
  const dr3=psiRe[k]-psiRe[i], di3=psiIm[k]-psiIm[i];
  const psiD=(Math.sqrt(dr1*dr1+di1*di1)+
              Math.sqrt(dr2*dr2+di2*di2)+
              Math.sqrt(dr3*dr3+di3*di3))/3;
  // геометрический множитель: треугольник рождается если узлы реально близко
  const gw=(W[i*N+j]+W[j*N+k]+W[k*N+i])/3;
  return psiD*(1.0-gw*0.6); // близкие геометрически → ниже порог рождения
}

function triKey(a,b,c){
  // канонический ключ: всегда i<j<k
  const s=[a,b,c].sort((x,y)=>x-y);
  return s[0]*65536+s[1]*256+s[2];
}

// быстрый Set для дедупликации
let S2keys=new Set();

function maybeBirthTriangles(attempts){
  if(S2.length>=MAX_TRIANGLES) return;
  let born=0;

  // v1.2: относительный порог α — доля от текущего максимума
  let aMax=0; for(let i=0;i<N;i++) if(alpha[i]>aMax) aMax=alpha[i];
  if(aMax<1e-9) return;
  const aThr=aMax*TRI_ALPHA_THR_REL;

  // кандидаты: узлы с α выше относительного порога
  const cands=[];
  for(let i=0;i<N;i++){
    if(alpha[i]<aThr) continue;
    let wSum=0; for(let j=0;j<N;j++) wSum+=W[i*N+j];
    cands.push({i, score: alpha[i]*wSum});
  }
  if(cands.length===0) return;
  cands.sort((a,b)=>b.score-a.score);
  const topN=Math.min(attempts*3, cands.length);

  for(let ci=0;ci<topN;ci++){
    if(S2.length>=MAX_TRIANGLES||born>=attempts) break;
    const i=cands[ci].i;

    // ближайшие соседи по W
    const nbrs=[];
    for(let j=0;j<N;j++){
      if(j===i) continue;
      if(W[i*N+j]>GEO_W_MIN) nbrs.push({j, w:W[i*N+j]});
    }
    if(nbrs.length<2) continue;
    nbrs.sort((a,b)=>b.w-a.w);

    const top=Math.min(8, nbrs.length);
    for(let a=0;a<top&&born<attempts;a++){
      for(let b=a+1;b<top&&born<attempts;b++){
        const j=nbrs[a].j, k=nbrs[b].j;
        // относительный порог для тройки
        const aAvg=(alpha[i]+alpha[j]+alpha[k])/3;
        if(aAvg<aThr*0.6) continue;
        const coh=coherence3(i,j,k);
        if(coh>TRI_BIRTH_THR) continue;
        const key=triKey(i,j,k);
        if(S2keys.has(key)) continue;
        const ids=[i,j,k].sort((a,b)=>a-b);
        S2.push(ids);
        H2.push(0.05);
        S2age.push(0);
        S2keys.add(key);
        born++;
      }
    }
  }
  if(born>0) slog('⧉ рождено '+born+' △','le brth');
}

function updateTriangles(){
  for(let s=S2.length-1;s>=0;s--){
    const [i,j,k]=S2[s];
    // защита: узлы могли умереть при realloc
    if(i>=N||j>=N||k>=N||!alive[i]||!alive[j]||!alive[k]){ S2.splice(s,1);H2.splice(s,1);S2age.splice(s,1);S2keys.delete(triKey(i,j,k));continue; }
    const coh=coherence3(i,j,k);
    H2[s]+=DT*(0.07*coh - TRI_DECAY*H2[s]);
    if(H2[s]<0) H2[s]=0;
    S2age[s]++;
    // распад: старые или слабые
    if(H2[s]<0.005||S2age[s]>2200){
      S2keys.delete(triKey(i,j,k));
      S2.splice(s,1);H2.splice(s,1);S2age.splice(s,1);
    }
  }
}

function trianglesBackreaction(){
  // сильные треугольники подталкивают свои узлы к синхронизации
  for(let s=0;s<S2.length;s++){
    const [i,j,k]=S2[s];
    if(i>=N||j>=N||k>=N) continue;
    if(!alive[i]||!alive[j]||!alive[k]) continue;  // v1.6
    const str=TRI_BACKREACTION*H2[s];
    // тянем каждый узел к центру масс треугольника
    const cRe=(psiRe[i]+psiRe[j]+psiRe[k])/3;
    const cIm=(psiIm[i]+psiIm[j]+psiIm[k])/3;
    psiRe[i]+=(cRe-psiRe[i])*str;  psiIm[i]+=(cIm-psiIm[i])*str;
    psiRe[j]+=(cRe-psiRe[j])*str;  psiIm[j]+=(cIm-psiIm[j])*str;
    psiRe[k]+=(cRe-psiRe[k])*str;  psiIm[k]+=(cIm-psiIm[k])*str;
  }
}

// ================================================================
// v0.97: ЭХО-ПЕТЛЯ
// узлы с накопленной модальной памятью излучают слабый сигнал
// своей доминирующей модальности обратно в собственную ψ
// это даёт системе внутренний голос — она слышит саму себя
// ================================================================
let echoSelfResCount=0;  // счётчик самоиндуцированных резонансов

function echoLoop(){
  if(dead||sleeping) return;
  if(N===0) return;

  // нормировка α
  let aMaxNow=0;
  for(let i=0;i<N;i++) if(alpha[i]>aMaxNow) aMaxNow=alpha[i];
  if(aMaxNow<1e-9) return;

  // собираем кандидатов на излучение
  // условие: α-rel > порога И в памяти есть модальные метки
  const emitters=[];
  for(let i=0;i<N;i++){
    const aRel=alpha[i]/aMaxNow;
    if(aRel<ECHO_LOOP_ALPHA_THR) continue;
    // ищем доминирующую модальность по nodeMemory
    const mem=nodeMemory[i];
    if(mem.size===0) continue;
    let bestMod=-1, bestC=0;
    for(const [w,c] of mem){
      // только модальные метки (с двоеточием)
      if(w.length>1 && w.charCodeAt(0)===58){
        const modName=w.slice(1);
        const mi=MODALITIES.indexOf(modName);
        if(mi>=0 && c>bestC){bestC=c;bestMod=mi;}
      }
    }
    if(bestMod<0) continue;
    // фактор усталости
    const fatigueF=1-echoFatigue[i]*ECHO_LOOP_REFRACTORY;
    if(fatigueF<.1) continue;
    emitters.push({node:i, mod:bestMod, count:bestC, aRel:aRel, fatigueF:fatigueF});
  }

  if(emitters.length===0) return;

  // сортируем по силе вклада и обрезаем по MAX_SELF
  emitters.sort((a,b)=>(b.aRel*b.count*b.fatigueF)-(a.aRel*a.count*a.fatigueF));
  const active=emitters.slice(0, ECHO_LOOP_MAX_SELF);

  // декремент усталости у всех
  for(let i=0;i<N;i++) echoFatigue[i]=Math.max(0, echoFatigue[i]-.02);

  // эмитим
  for(const em of active){
    const i=em.node;
    const sig=genSig(MODALITIES[em.mod]);
    // прогнать через T узла i — получаем ψ-вклад
    let r=0, im=0;
    for(let d=0;d<D_IN;d++){
      r+=TRe[i*D_IN+d]*sig[d];
      im+=TIm[i*D_IN+d]*sig[d];
    }
    // сила: масштабируется α, насыщенностью памяти, усталостью
    const conf=Math.min(1, em.count/10);
    const amp=ECHO_LOOP_STRENGTH * em.aRel * conf * em.fatigueF;
    // добавляем напрямую в ψ узла
    psiRe[i]+=r*amp;
    psiIm[i]+=im*amp;
    // нормировка
    const nm=Math.sqrt(psiRe[i]*psiRe[i]+psiIm[i]*psiIm[i]);
    if(nm>NORM_CLIP){psiRe[i]*=NORM_CLIP/nm;psiIm[i]*=NORM_CLIP/nm;}
    // повышаем усталость узла
    echoFatigue[i]=Math.min(1, echoFatigue[i]+.18);
  }

  // проверка самоиндуцированного резонанса
  // если суммарный вклад эхо был значительным — это шанс на +1E
  // считаем только раз на цикл эхо-петли
  if(active.length>=2 && energy<60){
    // взвешенное среднее aRel у эмиттеров
    let avgA=0; for(const em of active) avgA+=em.aRel;
    avgA/=active.length;
    if(avgA>0.4 && Math.random()<0.25){
      energy=Math.min(100, energy+1);
      echoSelfResCount++;
      if(echoSelfResCount%5===0){
        slog('◌ внутренний резонанс ('+active.length+' голосов) +1E','le res');
      }
    }
  }
}

// ================================================================
// ТЕКСТ → сигнал
// ================================================================
function textToSignal(txt){
  const x=new Float64Array(D_IN);
  const s=txt.trim().toLowerCase();
  if(!s.length) return x;
  for(let i=0;i<s.length;i++){
    const c=s.charCodeAt(i);
    const phase=(c/128)*2*Math.PI;
    const pos_f=i/Math.max(1,s.length-1);
    for(let d=0;d<D_IN;d++){
      const w=Math.exp(-((d/D_IN-pos_f)**2)*D_IN*.5);
      x[d]+=Math.sin(phase+d*.7)*w;
      x[d]+=Math.cos(phase*1.3+d*.4)*w*.5;
    }
  }
  let mx=0; for(let d=0;d<D_IN;d++) if(Math.abs(x[d])>mx) mx=Math.abs(x[d]);
  if(mx>0) for(let d=0;d<D_IN;d++) x[d]/=mx;
  return x;
}

// v1.3: физический генератор сигнала.
// band: 'sound' (низкая полоса) | 'light' (высокая полоса)
// side: 0..3 наклон фазы в одну из 4 сторон, -1 — без наклона
function genSigPhys(band, side){
  const x=new Float64Array(D_IN);
  const range = band==='light' ? BAND_LIGHT : BAND_SOUND;
  const w=range[0]+Math.random()*(range[1]-range[0]);
  const omega=w*2*Math.PI*8;          // несущая частота полосы
  const tilt = (typeof side==='number' && side>=0) ? side*Math.PI/2 : 0;
  for(let d=0;d<D_IN;d++){
    const u=d/D_IN;
    x[d]=Math.sin(omega*u + tilt*u*4)*Math.pow(0.96,d);
  }
  let mx=0; for(let d=0;d<D_IN;d++) if(Math.abs(x[d])>mx) mx=Math.abs(x[d]);
  if(mx>0) for(let d=0;d<D_IN;d++) x[d]/=mx;
  return x;
}

// старый генератор оставлен — используется эхо-петлёй и сном (REM-сны).
// для звука/света делегируем на физический genSigPhys; символ — случайная сторона.
function genSig(t){
  if(t==='sound')  return genSigPhys('sound', -1);
  if(t==='image')  return genSigPhys('light', -1);
  if(t==='symbol') return genSigPhys('sound', Math.floor(Math.random()*4));
  const x=new Float64Array(D_IN);
  return x;
}

// ================================================================
// РОЖДЕНИЕ УЗЛА
// ================================================================
// ── v1.6: МОРФОГЕНЕЗ ────────────────────────────────────────────
// Среда сама решает, СКОЛЬКО узлов и ГДЕ. Решение — от невязки рёбер
// (где поле+память меняются резче, чем дискретизация может представить).
// Порог адаптивный: медиана+K·MAD по живым рёбрам. Никаких MAX_NODES/родителей.

function edgeResidual(i,j){
  // невязка ребра: взвешенная сумма градиента ψ и разности памяти H
  const dpsi=(psiRe[i]-psiRe[j])**2+(psiIm[i]-psiIm[j])**2;
  const dH=Math.abs(hEff(H[i*N+j])-hEff(H[j*N+i])) + hEff(H[i*N+j]);
  return MORPH_W_PSI*dpsi + MORPH_W_H*dH;
}

function residStats(){
  // собираем невязки всех живых связанных рёбер, считаем медиану и MAD
  const vals=[];
  for(let i=0;i<N;i++){ if(!alive[i])continue;
    for(let j=i+1;j<N;j++){ if(!alive[j])continue;
      if(W[i*N+j]<GEO_W_MIN) continue;
      vals.push(edgeResidual(i,j));
    }
  }
  if(vals.length<3) return null;
  vals.sort((a,b)=>a-b);
  const med=vals[Math.floor(vals.length/2)];
  const dev=vals.map(v=>Math.abs(v-med)).sort((a,b)=>a-b);
  const mad=dev[Math.floor(dev.length/2)]||1e-6;
  return {med, mad, n:vals.length};
}

function pickBirthSite(){
  // ребро с максимальной невязкой среди живых связанных пар
  let bi=-1,bj=-1,best=-Infinity;
  for(let i=0;i<N;i++){ if(!alive[i])continue;
    for(let j=i+1;j<N;j++){ if(!alive[j])continue;
      if(W[i*N+j]<GEO_W_MIN) continue;
      const r=edgeResidual(i,j);
      if(r>best){best=r;bi=i;bj=j;}
    }
  }
  return {i:bi, j:bj, resid:best};
}

function pickDissolveNode(){
  // самый «гладкий и тихий» живой узел: минимальная локальная невязка + малая α,
  // достаточно зрелый. Это узел, чью информацию соседи и так несут.
  let best=-1, bestScore=Infinity;
  for(let i=0;i<N;i++){
    if(!alive[i]) continue;
    if(nodeAge[i]<MORPH_MIN_AGE) continue;
    if(alpha[i]>MORPH_ALPHA_QUIET) continue;
    let local=0,deg=0;
    for(let j=0;j<N;j++){ if(!alive[j]||j===i)continue;
      if(W[i*N+j]<GEO_W_MIN) continue;
      local+=edgeResidual(i,j); deg++;
    }
    if(deg===0){ // изолированный тихий узел — первый кандидат на растворение
      if(0<bestScore){bestScore=0;best=i;} continue;
    }
    const score=local/deg;
    if(score<bestScore){bestScore=score;best=i;}
  }
  return {node:best, score:bestScore};
}

// общая машинерия расширения массивов (из проверенного 1.5 tryBirthNode)
function growNode(siteI, siteJ){
  if(N>=HARD_CAP) return false;       // только аварийный предел, не закон
  const nn=N+1;
  const exp=(old,n)=>{
    const a=new Float64Array(nn*nn);
    for(let i=0;i<n;i++) for(let j=0;j<n;j++) a[i*nn+j]=old[i*n+j];
    return a;
  };
  W=exp(W,N);Pi=exp(Pi,N);H=exp(H,N);A=exp(A,N);R=exp(R,N);

  const nTR=new Float64Array(nn*D_IN), nTI=new Float64Array(nn*D_IN);
  for(let i=0;i<N;i++) for(let d=0;d<D_IN;d++){
    nTR[i*D_IN+d]=TRe[i*D_IN+d]; nTI[i*D_IN+d]=TIm[i*D_IN+d];
  }
  // T нового узла — среднее родительских концов ребра + мутация
  for(let d=0;d<D_IN;d++){
    nTR[N*D_IN+d]=.5*(TRe[siteI*D_IN+d]+TRe[siteJ*D_IN+d])+(Math.random()-.5)*.05;
    nTI[N*D_IN+d]=.5*(TIm[siteI*D_IN+d]+TIm[siteJ*D_IN+d])+(Math.random()-.5)*.05;
  }
  TRe=nTR; TIm=nTI;

  const nPR=new Float64Array(nn), nPI=new Float64Array(nn);
  nPR.set(psiRe); nPI.set(psiIm);
  nPR[N]=.5*(psiRe[siteI]+psiRe[siteJ]); nPI[N]=.5*(psiIm[siteI]+psiIm[siteJ]);
  psiRe=nPR; psiIm=nPI;

  const nAL=new Float64Array(nn);
  for(let i=0;i<N;i++) nAL[i]=alphaLogit[i];
  nAL[N]=.5*(alphaLogit[siteI]+alphaLogit[siteJ]);
  alphaLogit=nAL;
  alpha=new Float64Array(nn);

  nodeMemory.push(new Map());
  const newMP=new Float64Array(3);
  for(let k=0;k<3;k++) newMP[k]=Math.max(0, .5*(modPref[siteI][k]+modPref[siteJ][k])+(Math.random()-.5)*.04);
  modPref.push(newMP);

  const newFat=new Float64Array(nn);
  for(let i=0;i<N;i++) newFat[i]=echoFatigue[i];
  newFat[N]=0;
  echoFatigue=newFat;

  const nOm=new Float64Array(nn);
  for(let i=0;i<N;i++) nOm[i]=nodeOmega[i];
  nOm[N]=.5*(nodeOmega[siteI]+nodeOmega[siteJ])+(Math.random()-.5)*0.05;
  nodeOmega=nOm;

  // v1.6: расширяем маску жизни и возраст
  const nAlive=new Uint8Array(nn); nAlive.set(alive); nAlive[N]=1; alive=nAlive;
  const nAge=new Float64Array(nn); nAge.set(nodeAge); nAge[N]=0; nodeAge=nAge;

  // новый узел связан с обоими концами ребра, на котором родился
  W[N*nn+siteI]=.045; W[siteI*nn+N]=.045;
  W[N*nn+siteJ]=.045; W[siteJ*nn+N]=.045;
  R[N*nn+N]=.05;

  // КООРДИНАТА: середина «самого напряжённого ребра», спроецированная на сферу
  const mx=.5*(pos[siteI][0]+pos[siteJ][0]);
  const my=.5*(pos[siteI][1]+pos[siteJ][1]);
  const mz=.5*(pos[siteI][2]+pos[siteJ][2]);
  const rr=Math.sqrt(mx*mx+my*my+mz*mz)+1e-9;
  const sc=PLANET_R/rr;                         // прижать к поверхности планеты
  pos.push([mx*sc, my*sc, mz*sc]);
  vel.push([0,0,0]);

  N=nn; Nalive++;
  slog('⊕ узел #'+(N-1)+' на ребре #'+siteI+'–#'+siteJ+' (среда: невязка)','le brth');
  return true;
}

function dissolveNode(k){
  if(Nalive<=MORPH_FLOOR) return false;
  // размазать ψ и память узла в живых соседей пропорционально связи
  let wsum=0;
  for(let j=0;j<N;j++){ if(j===k||!alive[j])continue; if(W[k*N+j]<GEO_W_MIN)continue; wsum+=W[k*N+j]; }
  if(wsum>0){
    for(let j=0;j<N;j++){ if(j===k||!alive[j])continue; const w=W[k*N+j]; if(w<GEO_W_MIN)continue;
      const frac=w/wsum;
      psiRe[j]+=psiRe[k]*frac*.5; psiIm[j]+=psiIm[k]*frac*.5;
    }
  }
  // обнулить строку/столбец узла во всех матрицах (надгробие молчит)
  for(let j=0;j<N;j++){
    W[k*N+j]=0;W[j*N+k]=0; Pi[k*N+j]=0;Pi[j*N+k]=0;
    H[k*N+j]=0;H[j*N+k]=0; A[k*N+j]=0;A[j*N+k]=0; R[k*N+j]=0;R[j*N+k]=0;
  }
  psiRe[k]=0; psiIm[k]=0; alpha[k]=0; alphaLogit[k]=-9;
  alive[k]=0; Nalive--;
  // выкинуть треугольники, ссылающиеся на растворённый узел
  for(let s=S2.length-1;s>=0;s--){
    if(S2[s][0]===k||S2[s][1]===k||S2[s][2]===k){
      S2keys.delete(triKey(S2[s][0],S2[s][1],S2[s][2]));
      S2.splice(s,1);H2.splice(s,1);S2age.splice(s,1);
    }
  }
  slog('⊖ узел #'+k+' растворён в соседей (среда: гладко)','le dth');
  return true;
}

// v1.6: эйлерова характеристика триангуляции живого графа: χ = V − E + F.
// V — живые узлы, E — живые рёбра (W выше порога отрисовки), F — живые треугольники.
// Замкнутая оболочка-сфера ⇒ χ=2. Открытый лист ⇒ χ≈1. Это «датчик замыкания».
function eulerChar(){
  let V=0;
  for(let i=0;i<N;i++) if(alive[i]) V++;
  let E=0;
  for(let i=0;i<N;i++){ if(!alive[i])continue; for(let j=i+1;j<N;j++){ if(!alive[j])continue;
    if(W[i*N+j]>GEO_W_MIN*2) E++;   // тот же порог, что у отрисовки рёбер
  }}
  let F=0;
  for(let s=0;s<S2.length;s++){
    const [i,j,k]=S2[s];
    if(i>=N||j>=N||k>=N) continue;
    if(!alive[i]||!alive[j]||!alive[k]) continue;
    if(H2[s]>0.015) F++;
  }
  return {chi:V-E+F, V, E, F};
}

// v1.6: БЮДЖЕТНОЕ растворение. Единственный устойчивый сигнал в системе —
// глобальный энергобаланс (локальные мерцают). Если за окно приток не покрыл
// drain, организм сбрасывает один узел из хвоста α: «нас слишком много на эту
// энергию». Голод форсирует ужимание раньше смерти → гомеостаз N по метаболизму.
function budgetDissolveCheck(){
  budgetClock++;
  if(budgetClock<BUDGET_WINDOW) return;
  const balance = eInAcc - eOutAcc;     // приток минус расход за окно
  budgetBalance = balance;              // v1.6: запомнить для гейта роста (рождение в долг запрещено)
  // сброс окна
  eInAcc=0; eOutAcc=0; budgetClock=0;
  if(balance>=BUDGET_DEFICIT) return;   // баланс сходится — никого не трогаем
  if(Nalive<=MORPH_FLOOR) return;       // ниже пола не опускаемся
  // кандидат: наименее задействованный сейчас (нижняя доля α), без претензии «заслужил»
  const av=[];
  for(let i=0;i<N;i++) if(alive[i]) av.push({i,a:alpha[i]});
  if(av.length<4) return;
  av.sort((x,y)=>x.a-y.a);
  const pool=av.slice(0, Math.max(1, Math.floor(av.length*BUDGET_TAIL_FRAC)));
  // из хвоста берём узел с наименьшей суммарной памятью — наименее «вросший»
  let worst=pool[0].i, wH=Infinity;
  for(const {i} of pool){
    let hs=0; for(let j=0;j<N;j++){ if(!alive[j])continue; hs+=hEff(H[i*N+j]); }
    if(hs<wH){ wH=hs; worst=i; }
  }
  dissolveNode(worst);
  slog('⊖ бюджет: дефицит '+balance.toFixed(1)+'E/окно → сброшен #'+worst,'le dth');
}

// единый пересмотр топологии средой: вызывается из главного цикла
function morphStep(){
  // старим живые узлы
  for(let i=0;i<N;i++) if(alive[i]) nodeAge[i]++;
  // v1.6: РОЖДЕНИЕ В ДОЛГ ЗАПРЕЩЕНО. Если метаболизм не сводится (баланс окна
  // в дефиците), рост замирает — нельзя отращивать узлы, которые не прокормить.
  // Стартовый грейс: пока первое окно не замерено (budgetClock<window и баланс 0),
  // даём расти, чтобы организм встал на ноги.
  const startupGrace = (step<BUDGET_WINDOW);
  if(!startupGrace && budgetBalance<BUDGET_DEFICIT) return;  // голодаем → не растём
  const st=residStats();
  if(!st) return;
  const birthThr = st.med + MORPH_BIRTH_K*st.mad;
  // v1.6: число рождений за вызов задаёт ползунок «рост N» (GROW_STAGES[growStage]).
  // min гарантирован (если нижняя граница >0 и есть напряжённое ребро), до max.
  const [gMin,gMax]=GROW_STAGES[growStage];
  const want = gMin + Math.floor(Math.random()*(gMax-gMin+1));
  let born=0;
  for(let b=0; b<want; b++){
    const site=pickBirthSite();
    if(site.i<0) break;
    // ниже минимума рождаем даже без превышения порога (нижняя граница = «хотя бы столько»),
    // сверх минимума — только если ребро реально напряжено (среда решает)
    if(b<gMin || site.resid>birthThr){
      if(growNode(site.i, site.j)) born++;
      else break;
    } else break;
  }
}

// ================================================================
async function sleepCycle(){
  if(sleeping||dead) return;
  sleeping=true;
  healthCheck();  // v0.98: перед сном — чтобы не консолидировать NaN
  const ov=document.getElementById('sleep-overlay');
  const tx=document.getElementById('sleep-txt');
  ov.classList.add('on'); tx.classList.add('on');

  const aEnt=entropy(alpha);
  let weakLinks=0, totalLinks=0;
  for(let i=0;i<N;i++) for(let j=i+1;j<N;j++) if(W[i*N+j]>DEATH_THR){
    totalLinks++;
    if(W[i*N+j]<DEATH_THR*4) weakLinks++;
  }
  const weakRatio=totalLinks>0?weakLinks/totalLinks:0;
  let hAvg=0;
  for(let i=0;i<N*N;i++) hAvg+=hEff(H[i]);
  hAvg/=(N*N);

  let sleepKind;
  if(aEnt>.7 && weakRatio>.4) sleepKind='deep';
  else if(aEnt<.4 && hAvg>.3) sleepKind='rem';
  else sleepKind='light';
  lastSleepKind=sleepKind;

  const kindRu={deep:'глубокий сон',rem:'быстрый сон',light:'лёгкий сон'}[sleepKind];
  slog('━━ '+kindRu+' ━━','le slp');

  const beforeN=N;
  let beforeEdges=0;
  for(let i=0;i<N*N;i++) if(W[i]>DEATH_THR) beforeEdges++;
  beforeEdges=Math.floor(beforeEdges/2);
  const wordsBefore=new Map();
  for(const m of nodeMemory) for(const [w,c] of m) wordsBefore.set(w,(wordsBefore.get(w)||0)+c);

  const wait=ms=>new Promise(r=>setTimeout(r,ms));

  tx.textContent=kindRu+'...';
  await wait(500);

  let died=0;
  const pruneFactor = sleepKind==='deep' ? .2 : sleepKind==='rem' ? .6 : .4;
  const pruneRange  = sleepKind==='deep' ? 6  : sleepKind==='rem' ? 2  : 4;
  for(let i=0;i<N*N;i++){
    if(W[i]>0&&W[i]<DEATH_THR*pruneRange){
      W[i]*=pruneFactor;
      if(W[i]<DEATH_THR){W[i]=0;died++;}
    }
  }
  slog('  обрезка: −'+Math.floor(died/2)+' связей','le slp');

  if(sleepKind!=='rem'){
    tx.textContent='консолидация H...';
    await wait(500);
    const nH=new Float64Array(N*N);
    const mix = sleepKind==='deep' ? .4 : .28;
    for(let i=0;i<N;i++) for(let j=0;j<N;j++){
      let s=0,c=0;
      for(let k=0;k<N;k++) if(W[i*N+k]>DEATH_THR){s+=H[k*N+j];c++;}
      nH[i*N+j]=c>0?(1-mix)*H[i*N+j]+mix*(s/c):.88*H[i*N+j];
    }
    H.set(nH);
  }

  if(sleepKind==='rem'){
    tx.textContent='сновидения...';
    await wait(500);
    for(let r=0;r<5;r++){
      const x=genSig(MODALITIES[Math.floor(Math.random()*3)]);
      const{pR,pI}=applyT(x);
      for(let i=0;i<N;i++){
        alphaLogit[i]+=(Math.random()-.5)*.3;
      }
      for(let i=0;i<N;i++){
        psiRe[i]+=pR[i]*.02*(Math.random()-.5);
        psiIm[i]+=pI[i]*.02*(Math.random()-.5);
      }
    }
    slog('  · сновидения проявились','le slp');
  }

  tx.textContent='оптимизация T...';
  await wait(500);
  // v0.98: безопасная оптимизация T — clamped factor + нормировка каждую итерацию
  // старый код: (1+LR_T*0.4*hV[i])^itN при hV=8, itN=40 → ×7.5 → NaN в Float32
  const hV=new Float64Array(N);
  for(let i=0;i<N;i++){let s=0;for(let j=0;j<N;j++)s+=hEff(H[i*N+j]);hV[i]=Math.min(s,6);}
  const itN = sleepKind==='deep' ? 20 : sleepKind==='rem' ? 8 : 14;
  for(let it=0;it<itN;it++){
    for(let i=0;i<N;i++){
      // фактор: жёстко ограничен, чтобы за itN итераций суммарный рост ≤ ×1.5
      const factor=Math.min(1+LR_T*0.28*hV[i], 1.022);
      for(let d=0;d<D_IN;d++){
        TRe[i*D_IN+d]*=factor;
        TIm[i*D_IN+d]*=factor;
        // поэлементный hard-cap — защита от единичного выброса
        if(TRe[i*D_IN+d]>0.8) TRe[i*D_IN+d]=0.8;
        else if(TRe[i*D_IN+d]<-0.8) TRe[i*D_IN+d]=-0.8;
        if(TIm[i*D_IN+d]>0.8) TIm[i*D_IN+d]=0.8;
        else if(TIm[i*D_IN+d]<-0.8) TIm[i*D_IN+d]=-0.8;
      }
    }
    // нормировка после каждой итерации — не только в конце
    for(let i=0;i<N;i++){
      let nm=1e-9;
      for(let d=0;d<D_IN;d++) nm+=TRe[i*D_IN+d]**2+TIm[i*D_IN+d]**2;
      nm=Math.sqrt(nm);
      if(nm>0.45){
        const sc=0.45/nm;
        for(let d=0;d<D_IN;d++){TRe[i*D_IN+d]*=sc;TIm[i*D_IN+d]*=sc;}
      }
    }
  }

  for(let i=0;i<N;i++){
    alphaLogit[i]=alphaLogit[i]*.5+(Math.random()-.5)*.05;
  }

  let prunedWords=0;
  const wordThr = sleepKind==='deep' ? 3 : 2;
  const wordProb = sleepKind==='deep' ? .9 : sleepKind==='rem' ? .4 : .7;
  for(const m of nodeMemory){
    for(const [w,c] of [...m]){
      if(c<wordThr && Math.random()<wordProb){m.delete(w);prunedWords++;}
    }
  }

  tx.textContent='морфогенез (сон)...';
  await wait(500);
  let born=0;
  // v1.6: во сне среда активнее пересматривает топологию (рождение+растворение),
  // но по-прежнему только если есть энергия — голодный организм не растёт.
  const baseBirthAttempts = sleepKind==='rem' ? 6 : sleepKind==='deep' ? 2 : 4;
  let morphPasses;
  if(energy>70) morphPasses = baseBirthAttempts;
  else if(energy>40) morphPasses = Math.max(1, Math.floor(baseBirthAttempts*0.6));
  else if(energy>20) morphPasses = Math.max(1, Math.floor(baseBirthAttempts*0.3));
  else morphPasses = 0;  // голодная не перестраивается
  const aliveBefore=Nalive;
  for(let a=0;a<morphPasses;a++) morphStep();
  born=Math.max(0,Nalive-aliveBefore);

  // v0.99: рождение треугольников во сне — активнее чем в тике
  if(energy>20){
    const triAttempts=sleepKind==='rem'?12:sleepKind==='deep'?6:9;
    maybeBirthTriangles(triAttempts);
  }

  // ПАТЧ v0.95: стоимость сна = базовая + рождения − возврат за обрезку
  // обрезка экономит будущий drain, организму это окупается сейчас
  const eBase = sleepKind==='deep' ? 15 : sleepKind==='rem' ? 8 : 5;
  const eBirthCost = born * 2;
  const prunedEdges = Math.floor(died/2);
  const eRefund = prunedEdges * 0.05;  // возврат за полезную работу
  const eTotal = Math.max(0, eBase + eBirthCost - eRefund);
  energy = Math.max(0, energy - eTotal);
  const refundStr = eRefund>=0.5 ? ' − '+eRefund.toFixed(1)+'E возврат' : '';
  slog('  стоимость сна: −'+eTotal.toFixed(1)+'E (база '+eBase+' + '+eBirthCost+refundStr+')','le slp');
  await wait(400);

  let afterEdges=0;
  for(let i=0;i<N*N;i++) if(W[i]>DEATH_THR) afterEdges++;
  afterEdges=Math.floor(afterEdges/2);
  const wordsAfter=new Map();
  for(const m of nodeMemory) for(const [w,c] of m) wordsAfter.set(w,(wordsAfter.get(w)||0)+c);
  let topWord='', topC=0;
  for(const [w,c] of wordsAfter) if(c>topC){topC=c;topWord=w;}

  const dN=N-beforeN, dE=afterEdges-beforeEdges;
  const parts=[kindRu];
  if(dN>0) parts.push('+'+dN+' узлов');
  if(dE!==0) parts.push((dE>0?'+':'')+dE+' связей');
  if(prunedWords>0) parts.push('забыто '+prunedWords);
  parts.push('−'+eTotal.toFixed(1)+'E');
  if(topWord) parts.push('держится "'+topWord+'"×'+topC);
  const refl=parts.join(' · ');
  setReflection(refl, false);
  slog('☽ '+refl,'le slp');

  ov.classList.remove('on'); tx.classList.remove('on');
  sleeping=false;
  sleepTimer=1400+Math.floor(Math.random()*400);
  slog('━━ пробуждение ━━','le slp');
}

// ================================================================
// ЦИРКАДНЫЙ
// ================================================================
function updateCircadian(){
  // ── СОЛНЦЕ: суточное вращение Земли → высота над горизонтом ──
  const thSun = (step % DAY_LEN) / DAY_LEN * 2*Math.PI;
  circAngle = thSun;
  sunAlt  = Math.sin(thSun) * (1 - SUN_TILT);     // -1..1, 1 = зенит
  sunLight = Math.max(0, sunAlt);                 // фон от Солнца 0..1
  sunDir = [Math.cos(thSun), Math.sin(thSun)];    // направление на Солнце (для неба)

  // ── БАРИЦЕНТР Земля–Луна: радиус орбиты ∝ массе ПАРТНЁРА ──
  const thMoon = step / MOON_PERIOD * 2*Math.PI;  // сидерический ход Луны
  const Mtot = M_EARTH + M_MOON;
  const rEarth = BARY_A * (M_MOON  / Mtot);       // тяжёлая Земля — крошечная орбита
  const rMoon  = BARY_A * (M_EARTH / Mtot);       // лёгкая Луна — большая орбита
  earthXY = [ rEarth*Math.cos(thMoon),        rEarth*Math.sin(thMoon) ];
  moonXY  = [ rMoon *Math.cos(thMoon+Math.PI), rMoon *Math.sin(thMoon+Math.PI) ];

  // ── ФАЗА ЛУНЫ: элонгация Солнце–Земля–Луна ──
  // вектор Земля→Луна и направление на Солнце; освещённая доля = (1-cosθ)/2
  const e2m = [ moonXY[0]-earthXY[0], moonXY[1]-earthXY[1] ];
  const lm = Math.hypot(e2m[0],e2m[1]) || 1e-9;
  const cosElong = (e2m[0]*sunDir[0]+e2m[1]*sunDir[1]) / lm;
  moonPhase = (1 - cosElong) / 2;                 // 0 новолуние … 1 полнолуние

  // высота Луны над горизонтом: сдвинута относительно Солнца на её угловое
  // положение в небе (биение суточного и лунного хода → синодический месяц)
  const thMoonSky = thSun - thMoon;               // Луна отстаёт от Солнца
  moonAlt = Math.sin(thMoonSky) * (1 - SUN_TILT);
  // лунный свет — только когда Солнце под горизонтом
  moonLight = (sunAlt < 0)
    ? MOON_ALBEDO * Math.max(0, moonAlt) * moonPhase
    : 0;

  dayLight = Math.max(sunLight, moonLight);

  // ── ФАЗЫ-ЯРЛЫКИ из высоты Солнца ──
  if(sunAlt > 0.25)               circPhase='день';
  else if(sunAlt > -0.10){                          // у горизонта
    circPhase = (Math.cos(thSun) > 0) ? 'рассвет' : 'закат'; // высота растёт/падает
  }
  else                            circPhase='ночь';

  if(!sleeping){
    // фоновый зонд: частота и сила растут с освещённостью.
    // днём — солнечный фон, ночью — слабый лунный (отражённый) фон.
    if(dayLight > 0.04){
      const period = Math.round(520 / Math.max(0.15, dayLight)); // светлее → чаще
      if(step % Math.max(60, period) === 0){
        const mod=chooseModalityByAlpha();
        const modIdx=MODALITIES.indexOf(mod);
        const eGain = ENERGY_BG * (moonLight>sunLight ? MOON_ALBEDO : 1);
        const src = (moonLight>sunLight) ? 'луна·' : 'фон·';
        probe(genSig(mod), src+mod, null, modIdx, eGain);
      }
    }
    if(energy<20&&step%80===0) probe(genSig('sound'),'голод·зонд', null, 0, ENERGY_BG);
    sleepTimer--;
    if(sleepTimer<=0&&(circPhase==='ночь'||circPhase==='закат')&&!sleeping) sleepCycle();
  }
  if(step%25===0){
    // ПАТЧ v0.95: drain считается по ЗРЕЛЫМ узлам (hEff>0.3)
    // молодой граф не дорог в обслуживании — у организма есть «детство»
    // только узлы которые накопили опыт стоят метаболически
    let matureN=0;
    for(let i=0;i<N;i++){
      if(!alive[i]) continue;                       // v1.6: надгробия не стоят ресурса
      let hs=0; for(let j=0;j<N;j++){ if(!alive[j])continue; hs+=hEff(H[i*N+j]); }
      if(hs>0.3) matureN++;
    }
    // v1.6: ЭМЕРДЖЕНТНЫЙ ПОТОЛОК N. drain растёт как sqrt(зрелых живых) — чем
    // больше узлов отрастила среда, тем дороже их содержать. Рост идёт, пока
    // выгода (резонансы→энергия) перевешивает цену. Потолок ставит среда, не MAX_NODES.
    const effN=Math.max(8, matureN);
    const drain = Math.max(ENERGY_DRAIN_MIN, ENERGY_DRAIN_BASE*Math.sqrt(effN));
    // v1.6: в режиме капсида обычный drain приостановлен — метаболизм целиком
    energy=Math.max(0,energy-drain); eOutAcc+=drain;  // v1.6: учёт расхода в бюджет
  }

  // v1.6: смерть честная — только голод. Капсид теперь не предсмертный режим,
  // а форма покоя свободной мембраны, поэтому отдельной инкапсуляции нет.
  if(energy<=HUNGER_DEATH && !dead){
    dead=true;
    const lived=step>=OLD_AGE_HINT;          // прожил долго → богатое эхо
    captureEcho(lived);
    const wordStr=echoWords.length>0
      ? ' · след: '+echoWords.slice(0,3).map(w=>'"'+w.word+'"').join(' ')
      : '';
    const msg = lived
      ? 'прожита долгая жизнь. опыт передан дальше.'+wordStr
      : 'энергия иссякла. эхо ждёт следующей жизни.'+wordStr;
    setReflection(msg, false);
    slog('☠ смерть от голода'+(lived?' · богатое эхо':'')+' ('+echoWords.length+' слов)','le dth');
  }
}
