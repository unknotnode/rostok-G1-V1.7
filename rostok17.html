const gc=document.getElementById('gc');
const gctx=gc.getContext('2d');
let gcReady=false;   // v1.6: стал ли canvas валидного размера (защита от спирали)
let showMinimap=true; // v1.6: мини-карта всего ростка в углу

function resizeGC(){
  const gp=document.getElementById('graph-wrap');
  // v1.6: защита от нулевых размеров. Если панель ещё не разложена (старт,
  // поворот, медленная загрузка), clientWidth=0 → деление на ~0 в проекции
  // размазывало граф в спираль. Берём запасной размер и помечаем «не готов».
  const w=gp.clientWidth, h=gp.clientHeight;
  gcReady = (w>20 && h>20);
  const W=gcReady?w:320, H=gcReady?h:240;
  gc.width=W*window.devicePixelRatio;
  gc.height=H*window.devicePixelRatio;
  gc.style.width=W+'px';
  gc.style.height=H+'px';
  gctx.setTransform(1,0,0,1,0,0);
  gctx.scale(window.devicePixelRatio,window.devicePixelRatio);
}

// ================================================================
// 3D РЕНДЕР — вращение, проекция, z-сортировка
// ================================================================
let rotX=0.62, rotY=0.22;   // углы обзора (v1.5: больше наклон — видим землю под ростком)
let autoRotSpeed=0.0025;
let dragActive=false, dragLast=[0,0];

let camTarget=[0,0,0];  // v1.5: точка, на которую смотрит камера (центроид ростка)
const CAM_DIST=9;        // v1.5: дистанция камеры от ростка. росток (радиус ~1)
                         // занимает ~треть кадра, вокруг видна земля.
function project(x,y,z, W_, H_){
  // v1.5: камера центрирована на ростке, а не на центре планеты
  x-=camTarget[0]; y-=camTarget[1]; z-=camTarget[2];
  // вращение вокруг Y затем X
  const cy=Math.cos(rotY), sy=Math.sin(rotY);
  const cx=Math.cos(rotX), sx=Math.sin(rotX);
  const x1=x*cy+z*sy;
  const z1=-x*sy+z*cy;
  const y2=y*cx-z1*sx;
  const z2=y*sx+z1*cx;
  // перспективная проекция: камера отодвинута на CAM_DIST вдоль взгляда
  const fov=2.8;
  const depth=fov+z2+CAM_DIST;       // было +1.5 (камера почти в ростке)
  const sc=fov/Math.max(0.2, depth);
  return {
    sx: W_/2 + x1*sc*Math.min(W_,H_)*1.6,  // компенсируем дальность увеличением
    sy: H_/2 + y2*sc*Math.min(W_,H_)*1.6,
    sz: z2,
    sc: sc
  };
}

// ── v1.6: АНАЛИЗ КЛАСТЕРОВ (изучение колониального режима) ──────
// Находим связные компоненты по сильным рёбрам и определяем доминирующую
// модальность каждого. Отвечает на вопрос: специализируются ли кластеры
// (разделение труда) или это клоны (фрагментация без функции).
const MOD_RU=['звук','свет','символ'];
const MOD_HUE=[185, 310, 45];   // звук=циан, свет=маджента, символ=янтарь
let colorByMod=false;           // переключатель подсветки узлов по модальности
// v1.6: карта узел→модальность кластера (для засечек на шкале α). Обновляется
// периодически (анализ кластеров дорог — O(N²) BFS). analyzeFlash — таймер
// вспышки засечек после кнопки «анализ».
let nodeClusterMod=null;        // Int8Array(N): -1 нет кластера, иначе 0/1/2 модальность
let clusterMapStep=-1;          // когда последний раз считали карту
let analyzeFlash=0;             // кадры оставшейся вспышки засечек

function analyzeClusters(){
  const comp=new Int32Array(N).fill(-1);
  let nc=0;
  for(let s=0;s<N;s++){
    if(!alive[s]||comp[s]>=0) continue;
    const stack=[s]; comp[s]=nc;
    while(stack.length){
      const u=stack.pop();
      for(let v=0;v<N;v++){
        if(!alive[v]||comp[v]>=0) continue;
        if(W[u*N+v]>GEO_W_MIN*2){ comp[v]=nc; stack.push(v); }
      }
    }
    nc++;
  }
  const clusters=[];
  for(let c=0;c<nc;c++){
    const members=[];
    for(let i=0;i<N;i++) if(alive[i]&&comp[i]===c) members.push(i);
    if(members.length<2) continue;
    const mp=[0,0,0];
    const words=new Map();
    for(const i of members){
      for(let k=0;k<3;k++) mp[k]+=Math.max(0, modPref[i][k]);  // клип: доли не бывают отрицательными
      const m=nodeMemory[i];
      if(m) for(const [w,ct] of m){ if(w.startsWith(':')) continue; words.set(w,(words.get(w)||0)+ct); }
    }
    let dom=0; for(let k=1;k<3;k++) if(mp[k]>mp[dom]) dom=k;
    const total=mp[0]+mp[1]+mp[2]+1e-9;
    const purity=mp[dom]/total;
    let topW='', topC=0;
    for(const [w,ct] of words) if(ct>topC){topC=ct;topW=w;}
    clusters.push({members, dom, purity, mp, topW, topC, size:members.length});
  }
  clusters.sort((a,b)=>b.size-a.size);
  return clusters;
}

// v1.6: построить карту узел→модальность кластера для засечек на шкале.
// Кэшируется: пересчёт не чаще раза в ~60 кадров (BFS дорог).
function refreshClusterMap(){
  if(!nodeClusterMod || nodeClusterMod.length!==N) nodeClusterMod=new Int8Array(N);
  nodeClusterMod.fill(-1);
  const cl=analyzeClusters();
  for(const c of cl) for(const i of c.members) nodeClusterMod[i]=c.dom;
  clusterMapStep=step;
}

function reportClusters(){
  const cl=analyzeClusters();
  if(cl.length===0){ slog('анализ: нет выраженных кластеров (одно тело?)','le'); return; }
  const doms=new Set(cl.slice(0,6).map(c=>c.dom));
  const verdict = doms.size>=2 ? 'РАЗДЕЛЕНИЕ ТРУДА — модальности различаются'
                               : 'клоны (все к «'+MOD_RU[[...doms][0]]+'») — фрагментация без специализации';
  slog('═ '+cl.length+' кластеров · '+verdict,'le brth');
  for(let i=0;i<Math.min(6,cl.length);i++){
    const c=cl[i];
    const w = c.topW ? ' · "'+c.topW+'"×'+c.topC : '';
    slog('  '+String.fromCharCode(65+i)+': '+MOD_RU[c.dom]+
         ' ('+c.size+' уз, '+(c.purity*100|0)+'%)'+w,'le');
  }
}

function drawGraph(){
  const W_=gc.width/window.devicePixelRatio;
  const H_=gc.height/window.devicePixelRatio;
  const ctx=gctx;
  ctx.clearRect(0,0,W_,H_);

  // v1.7: атмосферный световой фон по высоте Солнца/Луны.
  // день — тёплая дымка к зениту, ночь — холодная синь, луна слегка серебрит.
  {
    if(sunAlt > -0.10){          // день/сумерки — тёплый
      const warm = Math.max(0, sunAlt);
      ctx.fillStyle = 'rgba('+Math.round(40+warm*40)+','+Math.round(30+warm*35)+','+Math.round(50+warm*20)+','+(0.04+warm*0.10).toFixed(3)+')';
      ctx.fillRect(0,0,W_,H_);
    } else {                     // ночь — холодная синь + лунное серебро
      ctx.fillStyle = 'rgba(8,12,30,'+(0.10 + (1-Math.max(0,sunAlt+0.10))*0.06).toFixed(3)+')';
      ctx.fillRect(0,0,W_,H_);
      if(moonLight>0){
        ctx.fillStyle = 'rgba(150,170,210,'+(moonLight*0.5).toFixed(3)+')';
        ctx.fillRect(0,0,W_,H_);
      }
    }
  }

  if(N===0) return;

  // авторотация
  if(!dragActive) rotY+=autoRotSpeed;

  // v1.5: камера следит за центроидом ростка
  let tcx=0,tcy=0,tcz=0;
  for(let i=0;i<N;i++){ tcx+=pos[i][0]; tcy+=pos[i][1]; tcz+=pos[i][2]; }
  tcx/=N; tcy/=N; tcz/=N;
  // плавное слежение, чтобы камера не дёргалась
  camTarget[0]+=(tcx-camTarget[0])*0.1;
  camTarget[1]+=(tcy-camTarget[1])*0.1;
  camTarget[2]+=(tcz-camTarget[2])*0.1;

  // ── ПЛАНЕТА: земля под ростком + дуга горизонта ──
  // НЕ рисуем кольцо вокруг подножия (давало иллюзию чаши). Рисуем:
  //  (1) землю как сетку на поверхности сферы ВПЕРЁД-И-ВНИЗ от ростка,
  //      затемняющуюся к горизонту;
  //  (2) линию горизонта — где сфера планеты уходит из виду.
  {
    const footx=camTarget[0], footy=camTarget[1], footz=camTarget[2];
    const fr=Math.sqrt(footx*footx+footy*footy+footz*footz)+1e-6;
    // up = радиаль (локальный «вверх», от центра планеты наружу)
    const ux=footx/fr, uy=footy/fr, uz=footz/fr;
    // касательный базис на поверхности
    let t1x=-uy, t1y=ux, t1z=0; let t1n=Math.hypot(t1x,t1y,t1z)+1e-9;
    t1x/=t1n; t1y/=t1n; t1z/=t1n;
    const t2x=uy*t1z-uz*t1y, t2y=uz*t1x-ux*t1z, t2z=ux*t1y-uy*t1x;
    // точка на поверхности по угловым смещениям (вдоль дуги сферы)
    function surf(da, db){
      // малые углы: точка = R·(cos·up + sin·направление)
      const ang=Math.sqrt(da*da+db*db);
      if(ang<1e-6) return [ux*PLANET_R, uy*PLANET_R, uz*PLANET_R];
      const dirx=(t1x*da+t2x*db)/ang, diry=(t1y*da+t2y*db)/ang, dirz=(t1z*da+t2z*db)/ang;
      const c=Math.cos(ang), s=Math.sin(ang);
      return [ (ux*c+dirx*s)*PLANET_R, (uy*c+diry*s)*PLANET_R, (uz*c+dirz*s)*PLANET_R ];
    }
    // сетка земли: угловой радиус до ~горизонта (acos(R/(R+h)) ≈ при h малом мал,
    // но для вида берём заметный сектор). шаг по углу.
    const maxAng=0.9;            // угловой охват земли (радианы вдоль сферы)
    const rings=7, segs=48;
    ctx.lineWidth=0.5;
    // концентрические дуги (постоянный угол от подножия) — но рисуем их как
    // КРИВЫЕ на сфере, не как кольцо в касательной плоскости: дальние уходят вниз
    for(let ri=1;ri<=rings;ri++){
      const ang=maxAng*ri/rings;
      const fade=0.28*(1-ri/(rings+1));   // дальше — бледнее
      ctx.strokeStyle='rgba(70,100,140,'+fade.toFixed(3)+')';
      ctx.beginPath(); let first=true, any=false;
      for(let si=0;si<=segs;si++){
        const th=2*Math.PI*si/segs;
        const q=surf(ang*Math.cos(th), ang*Math.sin(th));
        const p=project(q[0],q[1],q[2],W_,H_);
        // рисуем только то, что перед камерой (sz<граница) — заднюю часть сферы прячем
        if(p.sz<2.2){ if(first){ctx.moveTo(p.sx,p.sy);first=false;any=true;} else ctx.lineTo(p.sx,p.sy);}
        else first=true;
      }
      if(any) ctx.stroke();
    }
    // радиальные линии (меридианы от подножия наружу)
    for(let si=0;si<24;si++){
      const th=2*Math.PI*si/24;
      ctx.strokeStyle='rgba(70,100,140,0.12)';
      ctx.beginPath(); let first=true;
      for(let k=0;k<=rings*2;k++){
        const ang=maxAng*k/(rings*2);
        const q=surf(ang*Math.cos(th), ang*Math.sin(th));
        const p=project(q[0],q[1],q[2],W_,H_);
        if(p.sz<2.2){ if(first){ctx.moveTo(p.sx,p.sy);first=false;} else ctx.lineTo(p.sx,p.sy);}
        else first=true;
      }
      ctx.stroke();
    }
  }

  let amax=0; for(let i=0;i<N;i++) if(alpha[i]>amax) amax=alpha[i];
  if(amax<1e-9) amax=1;

  // проецируем все узлы
  const proj=[];
  for(let i=0;i<N;i++){
    proj.push(project(pos[i][0],pos[i][1],pos[i][2], W_,H_));
  }

  // ── треугольники: собираем с z для сортировки ──
  const tris=[];
  for(let s=0;s<S2.length;s++){
    const [i,j,k]=S2[s];
    if(i>=N||j>=N||k>=N) continue;
    if(!alive[i]||!alive[j]||!alive[k]) continue;  // v1.6
    const h=H2[s]; if(h<0.015) continue;
    const zAvg=(proj[i].sz+proj[j].sz+proj[k].sz)/3;
    tris.push({i,j,k,h,zAvg});
  }
  // рисуем дальние треугольники первыми (painter's algorithm)
  tris.sort((a,b)=>a.zAvg-b.zAvg);

  for(const t of tris){
    const {i,j,k,h}=t;
    const cRe=(psiRe[i]+psiRe[j]+psiRe[k])/3;
    const cIm=(psiIm[i]+psiIm[j]+psiIm[k])/3;
    const ph=Math.atan2(cIm,cRe);
    const hue=((ph/Math.PI+1)/2*180+155)%360;
    // нормаль для освещения (упрощённо через z)
    const avgSc=(proj[i].sc+proj[j].sc+proj[k].sc)/3;
    const light=0.35+avgSc*0.65;
    const fa=Math.min(0.28, h*0.32)*light;
    ctx.fillStyle='hsla('+hue+',72%,58%,'+fa+')';
    ctx.beginPath();
    ctx.moveTo(proj[i].sx, proj[i].sy);
    ctx.lineTo(proj[j].sx, proj[j].sy);
    ctx.lineTo(proj[k].sx, proj[k].sy);
    ctx.closePath();
    ctx.fill();
    // контур грани — чуть заметный
    ctx.strokeStyle='hsla('+hue+',60%,70%,'+(fa*0.6)+')';
    ctx.lineWidth=0.5;
    ctx.stroke();
  }

  // ── рёбра ──
  const edges=[];
  for(let i=0;i<N;i++){ if(!alive[i])continue; for(let j=i+1;j<N;j++){ if(!alive[j])continue;
    const w=W[i*N+j]; if(w<GEO_W_MIN*2) continue;
    edges.push({i,j,w,zAvg:(proj[i].sz+proj[j].sz)/2});
  }}
  edges.sort((a,b)=>a.zAvg-b.zAvg);
  for(const e of edges){
    const {i,j,w}=e;
    const depthFade=Math.max(0.1, 0.15+(proj[i].sc+proj[j].sc)*0.35);
    const alp=Math.min(0.55, w*9)*depthFade;
    const hue=160+A[i*N+j]*180;
    ctx.strokeStyle='hsla('+hue+',60%,60%,'+alp+')';
    ctx.lineWidth=Math.min(2.5, w*4.5);
    ctx.beginPath();
    ctx.moveTo(proj[i].sx, proj[i].sy);
    ctx.lineTo(proj[j].sx, proj[j].sy);
    ctx.stroke();
  }

  // ── узлы (поверх всего) ──
  // сортируем по z — дальние под ближними
  const nodeOrder=[...Array(N).keys()].filter(i=>alive[i]).sort((a,b)=>proj[a].sz-proj[b].sz);
  for(const i of nodeOrder){
    const p=proj[i];
    const nm=Math.sqrt(psiRe[i]**2+psiIm[i]**2);
    const ph=Math.atan2(psiIm[i],psiRe[i]);
    let hue;
    if(colorByMod){
      // v1.6: подсветка по доминирующей модальности узла (звук/свет/символ)
      const mp=modPref[i]; let dm=0; for(let k=1;k<3;k++) if(mp[k]>mp[dm]) dm=k;
      hue=MOD_HUE[dm];
    } else {
      hue=((ph/Math.PI+1)/2*180+155)%360;
    }
    const aN=alpha[i]/amax;
    // размер зависит от nm и перспективы
    const r=(2.2+nm*3.2)*p.sc*1.4;
    // свечение для высокоальфа узлов
    if(aN>0.55){
      ctx.strokeStyle='hsla(270,80%,70%,'+(aN*0.5)+')';
      ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.arc(p.sx,p.sy,r+2+aN*3,0,Math.PI*2); ctx.stroke();
    }
    // глубинное затемнение (дальние чуть темнее)
    const light=Math.max(0.5, p.sc*1.2);
    ctx.fillStyle='hsl('+hue+',65%,'+(Math.round(50*light))+'%)';
    ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,Math.PI*2); ctx.fill();
  }

  if(N>0){
    const k=alphaArgmax();
    const aEnt=entropy(alpha);
    const lbl=document.getElementById('focus-label');
    if(aEnt<ANSWER_ENTROPY_MAX) lbl.textContent='фокус: #'+k+' · H̄(α)='+aEnt.toFixed(2);
    else lbl.textContent='рассеянно · H̄(α)='+aEnt.toFixed(2);
  }

  if(showMinimap) drawMinimap(W_,H_);
  drawSky(W_,H_);
}

// v1.7: НЕБО — дуга горизонта вверху холста с диском Солнца и Луны.
// Положение по дуге = угол суток; высота диска над линией = высота над горизонтом.
function drawSky(W_,H_){
  const ctx=gctx;
  const cx=W_*0.5, horizon=64, r=Math.min(W_*0.42, 220);
  ctx.save();
  // линия горизонта
  ctx.strokeStyle='rgba(120,140,180,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(8,horizon); ctx.lineTo(W_-8,horizon); ctx.stroke();
  // позиция тела на дуге: x по фазе суток, y по высоте
  const place=(alt, ang)=>{
    const px = cx + Math.cos(ang)*r;
    const py = horizon - Math.max(-0.2,alt)*r*0.45;
    return [px,py];
  };
  // СОЛНЦЕ
  if(sunAlt > -0.15){
    const [sx,sy]=place(sunAlt, circAngle);
    const g=ctx.createRadialGradient(sx,sy,1,sx,sy,16);
    g.addColorStop(0,'rgba(255,225,140,'+(0.5+sunLight*0.5).toFixed(2)+')');
    g.addColorStop(1,'rgba(255,180,60,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,16,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,235,170,'+(0.6+sunLight*0.4).toFixed(2)+')';
    ctx.beginPath(); ctx.arc(sx,sy,5,0,7); ctx.fill();
  }
  // ЛУНА — с фазовым терминатором
  if(moonAlt > -0.15){
    const [mx2,my2]=place(moonAlt, circAngle - step/MOON_PERIOD*2*Math.PI);
    ctx.fillStyle='rgba(40,48,70,0.9)';
    ctx.beginPath(); ctx.arc(mx2,my2,5,0,7); ctx.fill();
    // освещённая доля
    ctx.fillStyle='rgba(200,210,235,'+(0.35+moonPhase*0.55).toFixed(2)+')';
    ctx.beginPath();
    ctx.arc(mx2,my2,5, -Math.PI/2, Math.PI/2, false);          // правый полудиск
    const k=(moonPhase-0.5)*2;                                  // -1..1 кривизна терминатора
    ctx.ellipse(mx2,my2,5*Math.abs(k),5, 0, Math.PI/2, -Math.PI/2, k>0);
    ctx.fill();
  }
  ctx.restore();
}

// v1.6: МИНИ-КАРТА — весь росток целиком в углу (родилась из бага «маленького
// экрана»). Своя проекция с авто-вписыванием: видно всю структуру, не крутя камеру.
function drawMinimap(W_,H_){
  if(N===0) return;
  const ctx=gctx;
  const mw=Math.min(150, W_*0.34), mh=mw*0.82;   // размер мини-окна
  const mx=W_-mw-8, my=H_-mh-8;                  // правый нижний угол
  // фон
  ctx.save();
  ctx.fillStyle='rgba(10,12,20,0.72)';
  ctx.strokeStyle='rgba(120,140,180,0.35)';
  ctx.lineWidth=1;
  ctx.fillRect(mx,my,mw,mh); ctx.strokeRect(mx,my,mw,mh);
  // проекция всех живых узлов фиксированным поворотом (без слежения камеры),
  // авто-масштаб по разбросу — весь росток влезает целиком
  let cx=0,cy=0,cz=0,n=0;
  for(let i=0;i<N;i++){ if(!alive[i])continue; cx+=pos[i][0];cy+=pos[i][1];cz+=pos[i][2];n++; }
  if(n===0){ctx.restore();return;}
  cx/=n;cy/=n;cz/=n;
  const cy_=Math.cos(rotY), sy_=Math.sin(rotY);
  const pts=[]; let rmax=1e-6;
  for(let i=0;i<N;i++){ if(!alive[i])continue;
    let x=pos[i][0]-cx, y=pos[i][1]-cy, z=pos[i][2]-cz;
    const xr=x*cy_-z*sy_;                    // поворот вокруг Y, как основной вид
    pts.push({i, px:xr, py:y});
    const r=Math.hypot(xr,y); if(r>rmax) rmax=r;
  }
  const sc=(Math.min(mw,mh)*0.42)/rmax;
  const ox=mx+mw/2, oy=my+mh/2;
  // рёбра (тонко)
  ctx.globalAlpha=0.5; ctx.strokeStyle='rgba(120,180,200,0.25)'; ctx.lineWidth=0.4;
  ctx.beginPath();
  for(const p of pts){
    for(const q of pts){ if(q.i<=p.i)continue;
      if(W[p.i*N+q.i]>GEO_W_MIN*3){
        ctx.moveTo(ox+p.px*sc, oy+p.py*sc);
        ctx.lineTo(ox+q.px*sc, oy+q.py*sc);
      }
    }
  }
  ctx.stroke();
  // узлы
  ctx.globalAlpha=1;
  for(const p of pts){
    let hue;
    if(colorByMod){ const mp=modPref[p.i]; let dm=0; for(let k=1;k<3;k++) if(mp[k]>mp[dm])dm=k; hue=MOD_HUE[dm]; }
    else { const ph=Math.atan2(psiIm[p.i],psiRe[p.i]); hue=((ph/Math.PI+1)/2*180+155)%360; }
    ctx.fillStyle='hsl('+hue+',70%,60%)';
    ctx.fillRect(ox+p.px*sc-1, oy+p.py*sc-1, 2, 2);
  }
  ctx.restore();
}

const vc=document.getElementById('vc');
const vctx=vc.getContext('2d');

function resizeVC(){
  const v=document.getElementById('vision');
  const w=v.clientWidth, h=v.clientHeight;
  const W=(w>20)?w:320, H=(h>10)?h:60;   // v1.6: защита от нулевых размеров
  vc.width=W*window.devicePixelRatio;
  vc.height=H*window.devicePixelRatio;
  vc.style.width=W+'px';
  vc.style.height=H+'px';
  vctx.setTransform(1,0,0,1,0,0);
  vctx.scale(window.devicePixelRatio,window.devicePixelRatio);
}

function drawVision(){
  const W_=vc.width/window.devicePixelRatio;
  const H_=vc.height/window.devicePixelRatio;
  const ctx=vctx;
  ctx.clearRect(0,0,W_,H_);
  if(N===0) return;

  const barW=W_/N;
  let amax=0; for(let i=0;i<N;i++) if(alpha[i]>amax) amax=alpha[i];
  if(amax<1e-9) amax=1;

  for(let i=0;i<N;i++){
    const h=(alpha[i]/amax)*(H_-10);
    const x=i*barW;
    const ph=Math.atan2(psiIm[i],psiRe[i]);
    const hue=((ph/Math.PI+1)/2*180+155)%360;
    const a=.3+alpha[i]/amax*.7;
    ctx.fillStyle='hsla('+hue+',70%,60%,'+a+')';
    ctx.fillRect(x+barW*.15, H_-5-h, barW*.7, h);
  }

  // v1.6: засечки кластеров над столбиками — цвет = модальность кластера.
  // Показываем при подсветке модальностей (постоянно) или вспышкой после «анализ».
  const showNotch = colorByMod || analyzeFlash>0;
  if(showNotch){
    if(!nodeClusterMod || nodeClusterMod.length!==N || step-clusterMapStep>60) refreshClusterMap();
    const flashA = analyzeFlash>0 ? Math.min(1, analyzeFlash/60) : 0.75;  // вспышка плавно гаснет
    for(let i=0;i<N;i++){
      if(!alive[i]) continue;
      const dm=nodeClusterMod[i];
      if(dm<0) continue;                       // узел не в кластере — без засечки
      const h=(alpha[i]/amax)*(H_-10);
      const x=i*barW;
      ctx.fillStyle='hsla('+MOD_HUE[dm]+',85%,62%,'+flashA+')';
      // засечка сверху столбика (или у пола, если столбик нулевой)
      const ny=Math.max(2, H_-5-h-4);
      ctx.fillRect(x+barW*.1, ny, barW*.8, 2.5);
    }
    if(analyzeFlash>0) analyzeFlash--;
  }

  const aEnt=entropy(alpha);
  const ey=H_-5-(1-aEnt)*(H_-10);
  ctx.strokeStyle='rgba(255,200,68,.5)';
  ctx.lineWidth=.8;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(0,ey); ctx.lineTo(W_,ey); ctx.stroke();
  ctx.setLineDash([]);

  const tau=currentTau();
  let hAvg=0,cnt=0;
  for(let i=0;i<N;i++) for(let j=0;j<N;j++){hAvg+=hEff(H[i*N+j]);cnt++;}
  hAvg/=cnt;
  document.getElementById('vmet').textContent =
    'τ='+tau.toFixed(2)+' · H̄(α)='+aEnt.toFixed(2)+' · H̄='+hAvg.toFixed(2);
}

function updateUI(){
  document.getElementById('s-step').textContent=step;
  document.getElementById('s-nodes').textContent=N;
  document.getElementById('s-tri').textContent=S2.length;
  let edges=0; for(let i=0;i<N*N;i++) if(W[i]>DEATH_THR) edges++;
  document.getElementById('node-count').textContent='N='+N+' E='+Math.floor(edges/2)+' △='+S2.length;
  document.getElementById('s-res').textContent=totalRes;
  document.getElementById('s-ans').textContent=totalAns;
  document.getElementById('s-life').textContent=lifeNum;

  const btnRst=document.getElementById('bn-rst');
  if(echoReady && dead){
    btnRst.textContent='перерождение';
    btnRst.classList.remove('d');
    btnRst.classList.add('g');
  } else {
    btnRst.textContent='сброс';
    btnRst.classList.remove('g');
    btnRst.classList.add('d');
  }

  const ep=Math.round(energy);
  document.getElementById('efill').style.width=ep+'%';
  document.getElementById('s-energy').textContent=ep+'%';

  const bh=document.getElementById('b-hunger');
  if(energy<15){bh.textContent='голод';bh.className='hbadge hng';}
  else if(energy<35){bh.textContent='голоден';bh.className='hbadge hng';}
  else if(energy<60){bh.textContent='умеренно';bh.className='hbadge';}
  else{bh.textContent='сыт';bh.className='hbadge';}

  const bs=document.getElementById('b-state');
  if(dead){bs.textContent='мёртв';bs.className='hbadge hng';}
  else if(sleeping){bs.textContent='сон';bs.className='hbadge slp';}
  else{bs.textContent='активен';bs.className='hbadge';}

  const bp=document.getElementById('b-phase');
  bp.textContent=circPhase;
  bp.className=circPhase==='день'?'hbadge on':'hbadge';

  if(step-lastAnswerStep>800 && !sleeping){
    const el=document.getElementById('reflection');
    if(!el.classList.contains('fade')) el.classList.add('fade');
  }
}

// ================================================================
// ГЛАВНЫЙ ЦИКЛ
// ================================================================
function tick(){
  if(!paused&&!sleeping&&!dead){
    for(let s=0;s<speed;s++){
      const{LsRe,LAIm}=buildL();
      updateField(LsRe,LAIm);
      updateGeom(LsRe,LAIm);
      updateCircadian();
      if(step%4===0) updateAlpha(0);
      // v0.97: эхо-петля — внутренний голос системы
      if(step%ECHO_LOOP_PERIOD===0) echoLoop();
      if(step%TRI_BIRTH_INTERVAL===0 && energy>25) maybeBirthTriangles(energy>55?10:5);
      if(step===200) maybeBirthTriangles(20); // v1.1b: принудительный первый запуск
      // v1.6: непрерывный морфогенез — среда сама решает N и места узлов.
      if(step%MORPH_PERIOD===0 && energy>30) morphStep();
      // v1.6: бюджетное растворение — метаболизм ставит потолок N
      budgetDissolveCheck();
      updateTriangles();
      trianglesBackreaction();
      physics3D();
      if(step%600===0) healthCheck();
      step++;
    }
  }
  // v1.6: пока canvas не получил валидный размер — пробуем пере-измерить.
  // Лечит спираль на старте/повороте, когда clientWidth был 0.
  if(!gcReady){ resizeGC(); resizeVC(); }
  drawGraph();
  drawVision();
  updateUI();
  requestAnimationFrame(tick);
}
